      if (!hasKit()) return;
      for (const h of kitDetach) { try { h.detach(); } catch (_) {} }
      kitDetach = [];
      document.querySelectorAll('#app [data-swipe]').forEach((row) => {
        const key = row.dataset.swipe;
        kitDetach.push(unNative.attachSwipeActions(row, {
          actions: [{
            label: 'Delete',
            destructive: true,
            // The kit removes the row from the DOM first, then calls this —
            // startPendingDelete re-renders with the row hidden and owns the
            // 5s undo window (Undo re-renders it back in).
            handler: () => {
              const i = key.indexOf(':');
              startPendingDelete(key.slice(0, i), +key.slice(i + 1));
            },
          }],
        }));
      });
      const bar = document.getElementById('un-navbar');
      if (bar) {
        kitDetach.push(unNative.attachNavBar(bar, {
          // The document never scrolls (fixed shell) — the default window
          // scrollEl would never fire; watch the app's own scroller.
          scrollEl: document.getElementById('scroll'),
          largeTitleEl: document.getElementById('un-large-title') || undefined,
        }));
      }
    }

    // One-shot autofocus: consumed on the render right after a surface
    // opens, so background re-renders (undo commits, side-chip taps) never
    // re-pop the mobile keyboard or scroll the page back to an input the
    // user navigated away from. Active typing survives re-renders via
    // captureFocus/restoreFocus instead.
    function takeFocus(surface) {
      if (pendingFocus !== surface) return false;
      pendingFocus = null;
      return true;
    }

    function wireInputs() {
      const form = document.getElementById('set-form');
      if (form) {
        form.addEventListener('submit', onSetSubmit);
        if (takeFocus('set-form')) {
          // Auto-focus only a blank form — focusing a pre-filled one pops the
          // mobile keyboard over values the user may just want to log as-is.
          const first = form.querySelector('input');
          if (first && !first.value) {
            first.focus({ preventScroll: true });
            first.scrollIntoView({ block: 'nearest' });
          }
        }
      }
      const ni = document.getElementById('entry-note-input');
      if (ni) {
        if (takeFocus('entry-note')) {
          ni.focus({ preventScroll: true });
          ni.scrollIntoView({ block: 'nearest' });
          ni.setSelectionRange(ni.value.length, ni.value.length);
        }
        ni.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); ni.blur(); }
          else if (e.key === 'Escape') { ni.dataset.cancel = '1'; ni.blur(); }
        });
        ni.addEventListener('blur', async () => {
          const cancelled = ni.dataset.cancel === '1';
          const entryId = +ni.dataset.entry;
          const val = ni.value;
          editingNote = null;
          if (cancelled) { render(); return; }
          try { await api('PATCH', '/api/session-exercises/' + entryId, { note: val }); }
          catch (err) { toast(err.message); }
          await refreshSession();
        });
      }
      const sni = document.getElementById('session-note-input');
      if (sni) {
        if (takeFocus('session-note')) {
          sni.focus({ preventScroll: true });
          sni.scrollIntoView({ block: 'nearest' });
          sni.setSelectionRange(sni.value.length, sni.value.length);
        }
        sni.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); sni.blur(); }
          else if (e.key === 'Escape') { sni.dataset.cancel = '1'; sni.blur(); }
        });
        sni.addEventListener('blur', async () => {
          const cancelled = sni.dataset.cancel === '1';
          const val = sni.value;
          editingSessionNote = false;
          if (cancelled) { render(); return; }
          try { await api('PATCH', '/api/sessions/' + session.id, { note: val }); }
          catch (err) { toast(err.message); }
          await refreshSession();
        });
      }
      if (importSheet) {
        const ta = document.getElementById('import-text');
        ta.value = importSheet.text;
        ta.addEventListener('input', () => { importSheet.text = ta.value; });
        const fi = document.getElementById('import-file');
        fi.addEventListener('change', () => {
          const f = fi.files && fi.files[0];
          if (!f) return;
          const r = new FileReader();
          r.onload = () => {
            if (!importSheet) return;
            importSheet.text = String(r.result || '');
            const cur = document.getElementById('import-text');
            if (cur) cur.value = importSheet.text;
          };
          r.readAsText(f);
        });
      }
      if (picker) {
        const si = document.getElementById('picker-search');
        si.value = picker.query;
        si.addEventListener('input', () => { picker.query = si.value; picker.creating = null; renderPickerList(); });
        if (takeFocus('picker')) si.focus({ preventScroll: true }); // sheet is fixed UI — no scrollIntoView needed
        renderPickerList();
      }
      if (view === 'progress' && progressHub) {
        const ps = document.getElementById('progress-search');
        if (ps) {
          // no autofocus — popping the keyboard would hide the body diagram
          ps.value = progressHub.query;
          ps.addEventListener('input', () => { progressHub.query = ps.value; renderProgressList(); });
          renderProgressList();
        }
      }
      if (bwEditor) {
        const bi = document.getElementById('bw-input');
        if (bi) {
          if (bodyweightKg) bi.value = String(kgToUnitNum(bodyweightKg));
          if (takeFocus('bw')) bi.focus({ preventScroll: true }); // sheet is fixed UI — no scrollIntoView needed
        }
      }
    }

    // ---------- import / export ----------

    // Handed to an AI (or a human) along with data from another app so it can
    // be transformed into our import format. Keep in sync with the server's
    // parseImportPayload / buildSetValues validation rules.
    const IMPORT_FORMAT_SPEC = [
      'GYM TRACKER — IMPORT FORMAT SPECIFICATION ("gym-tracker-export", version 1)',
      '',
      'Task: convert workout history from any other format into the JSON described',
      'below. The result is pasted into the app\'s "Import JSON" sheet (or uploaded',
      'as a .json file), so output ONLY the JSON document — valid, UTF-8, no',
      'comments, no trailing commas, no markdown fences.',
      '',
      'TOP LEVEL — either of these two forms:',
      '  { "format": "gym-tracker-export", "version": 1, "sessions": [ <Session>, ... ] }',
      '  [ <Session>, ... ]            (a bare array of sessions is also accepted)',
      '"format", "version", and "exported_at" are optional and ignored on import;',
      'only "sessions" matters. Unknown/extra keys anywhere are ignored.',
      'Limits: at most 1000 sessions and 20000 total sets per file.',
      '',
      'SESSION object — one workout:',
      '  "started_at"  REQUIRED string. Any date string JavaScript\'s new Date()',
      '                parses; strongly prefer ISO 8601 with an explicit timezone,',
      '                e.g. "2024-05-03T18:30:00Z" or "2024-05-03T18:30:00+02:00".',
      '                This is the session\'s identity: a session whose started_at',
      '                resolves to the exact same instant (millisecond-exact) as one',
      '                already stored is SKIPPED, which makes re-imports safe. So:',
      '                keep timestamps stable across conversions, never give two',
      '                sessions in one file the same instant, and if the source only',
      '                has a date (no time), pick a consistent convention like',
      '                "T12:00:00Z".',
      '  "note"        optional string or null. Freeform; trimmed, max 500 chars kept.',
      '  "exercises"   optional array of Exercise (default []). Order is preserved.',
      '',
      'EXERCISE object — one exercise performed in the session:',
      '  "name"  REQUIRED non-empty string, max 120 chars (leading/trailing whitespace',
      '          trimmed, internal runs of whitespace collapsed to single spaces).',
      '          Matched case-insensitively against the user\'s existing exercises and',
      '          created on demand — "Bench Press" and "bench press" are the same',
      '          exercise. Use one consistent spelling per movement so history links up.',
      '  "type"  optional "reps" | "time" — the exercise\'s fixed logging type. Every',
      '          exercise is permanently either rep-based or time-based, chosen when',
      '          it is created. The field is only consulted when the import has to',
      '          CREATE the exercise (an existing exercise keeps its type); when',
      '          omitted, the type is inferred from the exercise\'s sets across the',
      '          whole file (majority wins; tie or no sets → "reps").',
      '  "note"  optional string or null, max 500 chars. Put qualifiers like assisted',
      '          reps or band assistance here — there are no dedicated fields for them.',
      '  "sets"  optional array of Set (default []). Order is preserved and meaningful',
      '          (see "drop" below).',
      '',
      'SET object — exactly one of two shapes, chosen by "type" (alias "set_type"):',
      '  Shape 1 — "type": "reps"  (rep-based work):',
      '    "reps"    REQUIRED integer, 1 to 9999.',
      '    "weight"  REQUIRED number, 0 to 99999 (kept to 2 decimal places).',
      '              Weights are stored in KILOGRAMS: if the source data is in',
      '              pounds, convert to kg (divide by 2.20462, round to 2 decimals);',
      '              if it is already kg, carry the number through unchanged. The',
      '              app converts to the user\'s display unit (kg or lbs) at render',
      '              time. Use 0 for bodyweight sets.',
      '  Shape 2 — "type": "time"  (timed holds / cardio):',
      '    "duration_seconds"  REQUIRED integer, 1 to 86400 (whole seconds; convert',
      '                        mm:ss or minutes to seconds).',
      '    "effort"            optional string or null, max 120 chars — freeform,',
      '                        e.g. "hard", "level 12", "5 km".',
      '  Omit the other shape\'s fields (they are ignored and stored as null).',
      '  Fields valid on BOTH shapes:',
      '    "side"        optional "left" | "right" | null (any other value is an',
      '                  error). null/omitted means both sides / untagged. For',
      '                  "each side" work, emit two sets: one "left", one "right".',
      '    "drop"        optional boolean (alias "is_drop"), default false. true marks',
      '                  this set as a drop-set continuation of the set immediately',
      '                  before it; a run of consecutive drop:true sets after a normal',
      '                  set displays as one drop chain, so array order matters. The',
      '                  first set of an exercise should not be drop:true.',
      '    "note"        optional string or null, max 500 chars.',
      '    "created_at"  optional date string; defaults to the session\'s started_at.',
      '                  Only set it if the source has real per-set timestamps.',
      '',
      'VALIDATION & BEHAVIOR:',
      '- The whole file is validated before anything is written: one invalid value',
      '  rejects the entire import (all-or-nothing, no partial writes). Errors name',
      '  the offending path, e.g. "sessions[2].exercises[0].sets[1]: reps must be a',
      '  whole number between 1 and 9999".',
      '- Import is additive — it never edits or deletes existing data. Already-present',
      '  sessions (exact started_at match) are skipped, so importing twice is safe.',
      '',
      'WORKED EXAMPLE (valid, importable as-is):',
      '{',
      '  "format": "gym-tracker-export",',
      '  "version": 1,',
      '  "sessions": [',
      '    {',
      '      "started_at": "2024-05-03T18:30:00Z",',
      '      "note": "Push day",',
      '      "exercises": [',
      '        {',
      '          "name": "Bench Press",',
      '          "sets": [',
      '            { "type": "reps", "reps": 10, "weight": 60 },',
      '            { "type": "reps", "reps": 8, "weight": 70, "note": "spotter on last rep" },',
      '            { "type": "reps", "reps": 8, "weight": 50, "drop": true }',
      '          ]',
      '        },',
      '        {',
      '          "name": "Single-arm Row",',
      '          "note": "3s pause at the top",',
      '          "sets": [',
      '            { "type": "reps", "reps": 12, "weight": 24, "side": "left" },',
      '            { "type": "reps", "reps": 12, "weight": 24, "side": "right" }',
      '          ]',
      '        },',
      '        {',
      '          "name": "Plank",',
      '          "sets": [ { "type": "time", "duration_seconds": 90, "effort": "hard" } ]',
      '        }',
      '      ]',
      '    }',
      '  ]',
      '}',
    ].join('\n');

    async function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        try { await navigator.clipboard.writeText(text); return; } catch (_) { /* fall through */ }
      }
      // Fallback for iframes / older WebViews without clipboard permission.
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      let ok = false;
      try { ok = document.execCommand('copy'); } catch (_) {}
      ta.remove();
      if (!ok) throw new Error('Couldn’t copy — clipboard unavailable in this browser');
    }

    // The old one-click flow triggered a programmatic <a download> click and
    // nothing else. Inside the platform's sandboxed iframe (and most in-app
    // WebViews) that download is silently blocked — no error, no console
    // output — so the button looked dead. Export now opens a sheet that
    // shows the data and offers Download plus a Copy fallback that works
    // everywhere.
    async function openExportSheet() {
      // Can't use api(): we want the raw text, not a consumed JSON object.
      const res = await fetch('/api/export' + (demo ? '?demo=1' : ''), { headers: authHeaders });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.error || 'Export failed (' + res.status + ')');
      }
      const text = await res.text();
      let count = 0;
      try { count = (JSON.parse(text).sessions || []).length; } catch (_) {}
      exportSheet = {
        text,
        filename: 'gym-tracker-export-' + new Date().toISOString().slice(0, 10) + '.json',
        count,
        copied: false,
      };
      render();
    }

    function downloadExport() {
      const blob = new Blob([exportSheet.text], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = exportSheet.filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    // ---------- set form ----------
    function findEntryLocal(id) {
      return session.entries.find((e) => e.id === id);
    }
    // draft.weight is in the display unit; draft.weightKg keeps the exact
    // stored kg so an untouched field saves back the same value instead of
    // drifting through a lbs round-trip.
    function draftFromSet(st) {
      return {
        type: st.set_type,
        reps: st.reps ?? '',
        weight: st.weight != null ? fmtW(st.weight) : '',
        weightKg: st.weight != null ? parseFloat(st.weight) : null,
        duration: st.duration_seconds != null ? fmtDur(st.duration_seconds) : '',
        effort: st.effort || '',
        side: st.side || '',
        drop: !!st.is_drop,
        note: st.note || '',
      };
    }
    function lastSetOfType(sets, type) {
      for (let i = sets.length - 1; i >= 0; i--) {
        if (sets[i].set_type === type) return sets[i];
      }
      return null;
    }
    function prefillDraft(entryId) {
      const en = findEntryLocal(entryId);
      // New sets always take the exercise's fixed type, so prefill only from
      // the most recent set of that type — a legacy mismatched set must not
      // drag the form to the wrong shape.
      const type = en.exercise_type === 'time' ? 'time' : 'reps';
      const src = lastSetOfType(en.sets, type) ||
        (en.last_time ? lastSetOfType(en.last_time.sets, type) : null);
      // Side carries over (log left, flip one toggle to log right); note and
      // the drop flag always start fresh.
      if (src) { const d = draftFromSet(src); d.note = ''; d.drop = false; return d; }
      return { type, reps: '', weight: '', weightKg: null, duration: '', effort: '', side: '', drop: false, note: '' };
    }
    function readDraft(form) {
      const g = (n) => { const i = form.querySelector('[name="' + n + '"]'); return i ? i.value : ''; };
      const dropEl = form.querySelector('[name="drop"]');
      return { type: openForm.draft.type, side: openForm.draft.side || '', reps: g('reps'), weight: g('weight'), weightKg: openForm.draft.weightKg ?? null, duration: g('duration'), effort: g('effort'), drop: dropEl ? dropEl.checked : !!openForm.draft.drop, note: g('note') };
    }
    // The kg value to save: if the field still shows the untouched original,
    // keep the exact stored kg; otherwise convert what was typed.
    function draftWeightKg(d) {
      const n = Number(d.weight);
      return d.weightKg != null && n === kgToUnitNum(d.weightKg) ? d.weightKg : unitToKg(n);
    }

    async function onSetSubmit(e) {
      e.preventDefault();
      const d = readDraft(e.target);
      openForm.draft = d;
      await flushPendingDelete();
      // No set_type: the server derives it from the exercise on create and
      // locks it to the existing shape on edit.
      const body = { side: d.side || null, is_drop: !!d.drop, note: d.note };
      if (d.type === 'reps') {
        if (d.reps.trim() === '') { openForm.error = 'Enter reps'; return render(); }
        if (d.weight.trim() === '') { openForm.error = 'Enter weight (0 for bodyweight)'; return render(); }
        body.reps = Number(d.reps);
        body.weight = draftWeightKg(d);
      } else {
        const dur = parseDur(d.duration);
        if (!Number.isInteger(dur) || dur < 1) { openForm.error = 'Enter duration as seconds or mm:ss'; return render(); }
        body.duration_seconds = dur;
        body.effort = d.effort;
      }
      try {
        if (openForm.setId) {
          await api('PATCH', '/api/sets/' + openForm.setId, body);
          openForm = null;
        } else {
          await api('POST', '/api/session-exercises/' + openForm.entryId + '/sets', body);
          stopwatchStart = Date.now(); // logging a set (re)starts the rest stopwatch
          openForm = null; // close on success; the next "+ Add set" prefills from this set
        }
        await refreshSession();
      } catch (err) {
        openForm.error = err.message;
        render();
      }
    }

    // ---------- data loading ----------
    async function loadHome() {
      sessions = (await api('GET', '/api/sessions')).sessions;
      view = 'home';
      session = null;
      render();
    }
    async function refreshSession() {
      try {
        session = await api('GET', '/api/sessions/' + session.id);
        render();
      } catch (err) {
        toast(err.message);
        await loadHome();
      }
    }
    // Reload the exercise chart screen in place (after a history-row delete),
    // keeping the selected metric when it still applies.
    async function refreshExerciseView() {
      if (!exerciseView) return;
      try {
        const data = await api('GET', '/api/exercises/' + exerciseView.data.id + '/history');
        exerciseView.data = data;
        const metrics = exerciseMetrics(data);
        if (!metrics.includes(exerciseView.metric)) exerciseView.metric = metrics[0] || 'maxw';
        render();
      } catch (err) {
        toast(err.message);
        await loadHome();
      }
    }
    async function openSession(id) {
      session = await api('GET', '/api/sessions/' + id);
      view = 'session';
      openForm = null;
      editingNote = null;
      editingSessionNote = false;
      importSheet = null;
      exportSheet = null;
      picker = null;
      seedStopwatch();
      render();
    }

    // ---------- stopwatch (client-side only) ----------
    function seedStopwatch() {
      let newest = 0;
      for (const en of session.entries) {
        for (const st of en.sets) {
          const t = new Date(st.created_at).getTime();
          if (t > newest) newest = t;
        }
      }
      stopwatchStart = newest && Date.now() - newest < 30 * 60 * 1000 ? newest : null;
    }
    function tick() {
      const el = document.getElementById('stopwatch');
      if (!el) return;
      if (!stopwatchStart) { el.textContent = '—:—'; return; }
      const s = Math.floor((Date.now() - stopwatchStart) / 1000);
      if (s >= 3600) { stopwatchStart = null; el.textContent = '—:—'; return; }
      el.textContent = fmtDur(s);
    }
    setInterval(tick, 1000);

    // ---------- deferred delete (swipe on touch, X buttons on desktop) ----------
    // Deferred delete: the row is hidden immediately, but the DELETE request
    // is only sent when the 5s undo window closes — Undo is a pure
    // client-side restore, nothing to recreate server-side.
    const DELETE_LABELS = { session: 'Workout deleted', entry: 'Exercise removed', set: 'Set deleted', hist: 'Removed from that workout' };

    function isPendingDelete(kind, id) {
      return !!pendingDelete && pendingDelete.kind === kind && pendingDelete.id === id;
    }
    // 'hist' rows (exercise history) key on the session id but delete the
    // underlying entry rows — usually one, more if the exercise was added to
    // that workout twice.
    function deleteUrlsFor(pd) {
      if (pd.kind === 'session') return ['/api/sessions/' + pd.id];
      if (pd.kind === 'entry') return ['/api/session-exercises/' + pd.id];
      if (pd.kind === 'hist') return (pd.entryIds || []).map((id) => '/api/session-exercises/' + id);
      return ['/api/sets/' + pd.id];
    }
    // No-kit fallback pill; with the kit the undo window is a priority
    // action toast presented in startPendingDelete.
    function showUndoToast(msg) {
      document.getElementById('undo-toast-msg').textContent = msg;
      document.getElementById('undo-toast').classList.remove('hidden');
    }
    function hideUndoToast() {
      document.getElementById('undo-toast').classList.add('hidden');
    }
    function startPendingDelete(kind, id) {
      // Resolve the entry ids up front — the commit may fire after the view
      // (and exerciseView with it) has moved on.
      let entryIds = null;
      if (kind === 'hist') {
        const s = exerciseView && exerciseView.data.sessions.find((x) => x.session_id === id);
        entryIds = s ? s.entry_ids : [];
        if (!entryIds.length) return;
      }
      flushPendingDelete().catch((err) => toast(err.message)); // a new swipe commits the previous pending delete right away
      if (hasKit()) {
        // The kit's priority action toast owns the undo window: ordinary
        // toasts queue behind it, and onClose fires exactly once — commit on
        // any close reason except 'action' (= Undo tapped). The identity
        // guard makes the stale onClose of a displaced or already-flushed
        // toast a no-op (a second swipe's new priority toast closes this one
        // with 'replaced' *after* flushPendingDelete already committed it).
        const pd = { kind, id, entryIds, timer: null, handle: null };
        pendingDelete = pd;
        pd.handle = unNative.toast(DELETE_LABELS[kind], {
          priority: true,
          duration: 5000,
          action: { label: 'Undo', handler: undoPendingDelete },
          onClose: (reason) => {
            if (reason !== 'action' && pendingDelete === pd) {
              commitPendingDelete().catch((err) => toast(err.message));
            }
          },
        });
        render();
      } else {
        pendingDelete = { kind, id, entryIds, timer: setTimeout(() => { commitPendingDelete().catch((err) => toast(err.message)); }, 5000), handle: null };
        render();
        showUndoToast(DELETE_LABELS[kind]);
      }
    }
    function undoPendingDelete() {
      if (pendingDelete) { clearTimeout(pendingDelete.timer); pendingDelete = null; }
      hideUndoToast();
      render();
    }
    // Send the deferred DELETE. {noRefresh} callers are about to load fresh
    // data themselves; on failure the current view always reloads so the
    // hidden row reappears.
    async function commitPendingDelete(opts) {
      if (!pendingDelete) return;
      const pd = pendingDelete;
      pendingDelete = null; // before dismiss(), so the toast's onClose('dismiss') no-ops
      clearTimeout(pd.timer);
      if (pd.handle) { try { pd.handle.dismiss(); } catch (_) {} }
      hideUndoToast();
      if (openForm && ((pd.kind === 'entry' && openForm.entryId === pd.id) || (pd.kind === 'set' && openForm.setId === pd.id))) openForm = null;
      let failed = false;
      try {
        for (const url of deleteUrlsFor(pd)) await api('DELETE', url);
      } catch (err) {
        failed = true;
        toast(err.message);
      }
      if (failed || !opts || !opts.noRefresh) {
        // carry in-progress set-form typing across the re-render
        const form = document.getElementById('set-form');
        if (form && openForm) openForm.draft = readDraft(form);
        if (view === 'exercise' && exerciseView) await refreshExerciseView();
        else if (view === 'home' || !session) await loadHome();
        else await refreshSession();
      }
    }
    function flushPendingDelete() {
      return commitPendingDelete({ noRefresh: true });
    }
    // Hiding/closing the page mid-window must not orphan the deletion.
    function flushPendingDeleteKeepalive() {
      if (!pendingDelete) return;
      const pd = pendingDelete;
      pendingDelete = null; // before dismiss(), so the toast's onClose('dismiss') no-ops
      clearTimeout(pd.timer);
      if (pd.handle) { try { pd.handle.dismiss(); } catch (_) {} }
      hideUndoToast();
      needsRefreshOnShow = true;
      try {
        for (const url of deleteUrlsFor(pd)) fetch(url, { method: 'DELETE', headers: authHeaders, keepalive: true });
      } catch (_) {}
    }
    window.addEventListener('pagehide', flushPendingDeleteKeepalive);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') flushPendingDeleteKeepalive();
      else if (needsRefreshOnShow) {
        needsRefreshOnShow = false;
        (view === 'exercise' && exerciseView ? refreshExerciseView()
          : view === 'home' || !session ? loadHome()
          : refreshSession()).catch((err) => toast(err.message));
      }
    });

    // Pull-to-refresh (kit; no-op on desktop): the document is a fixed
    // shell and #scroll is the app's only scroller, so attach once in
    // element-container mode. Reloads whatever view is current — same
    // dispatch as the visibilitychange reload above — flushing any pending
    // swipe delete first so lists stay consistent.
    if (hasKit()) {
      unNative.attachPullToRefresh(document.getElementById('scroll'), async () => {
        try {
          await flushPendingDelete();
          if (view === 'session' && session) await refreshSession();
          else if (view === 'progress') await openProgress();
          else if (view === 'exercise' && exerciseView) await refreshExerciseView();
          else if (view === 'muscle' && muscleView) await openMuscleChart(muscleView.muscle);
          else await loadHome();
        } catch (err) {
          toast(err.message);
        }
      });
    }

    // iOS focus pinning (issue #34): Safari can pan the visual viewport in
    // the instant between focusing an input and the kit publishing
    // --un-kb-inset (the #scroll keyboard padding isn't there yet when
    // Safari runs its own reveal-on-focus). Once the keyboard geometry
    // settles, undo any stray document offset and re-reveal the field
    // inside #scroll — the document itself can no longer scroll, so this
    // is the whole correction. No-op while nothing is focused so it never
    // fights user scrolling.
    //
    // Two triggers share the one pin routine:
    //  - visualViewport resize/scroll — the keyboard opening/closing (and
    //    any stray pan) on FIRST focus.
    //  - focusin while the keyboard is already up (html.un-kb) — tapping a
    //    SECOND field fires NO viewport event (the keyboard stays open), so
    //    without this the browser's own reveal-on-focus is the only
    //    scroller, and on iOS it pans/centers the whole frame, which our
    //    late viewport correction then yanked back — the "moves around
    //    when tapping another box" report. Revealing the field ourselves
    //    synchronously (the #scroll keyboard padding is already in place)
    //    leaves the native reveal nothing to do, so nothing moves but the
    //    inner scroller, minimally. Gated on un-kb so desktop and the
    //    first-focus path are untouched.
    if (window.visualViewport) {
      let pinQueued = false;
      const pinFocusedInput = () => {
        pinQueued = false;
        const el = document.activeElement;
        if (!el || (el.tagName !== 'INPUT' && el.tagName !== 'TEXTAREA') || !el.closest('#scroll')) return;
        if (window.scrollX || window.scrollY) window.scrollTo(0, 0);
        // Reveal within the strip the user can actually see: #scroll spans
        // the full viewport, so scrollIntoView's own visibility math ignores
        // both the keyboard (bottom, --un-kb-inset of content padding — not
        // a smaller scrollport) and the fixed navbar (top). Scroll the inner
        // container directly, minimally, against those real bounds.
        const scroller = document.getElementById('scroll');
        const kb = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--un-kb-inset')) || 0;
        const nav = document.querySelector('.un-navbar');
        const topLimit = (nav ? nav.getBoundingClientRect().bottom : 0) + 8;
        const bottomLimit = window.innerHeight - kb - 8;
        const rect = el.getBoundingClientRect();
        if (rect.bottom > bottomLimit) scroller.scrollTop += rect.bottom - bottomLimit;
        else if (rect.top < topLimit) scroller.scrollTop -= topLimit - rect.top;
      };
      const queuePin = () => {
        if (pinQueued) return;
        pinQueued = true;
        requestAnimationFrame(pinFocusedInput);
      };
      window.visualViewport.addEventListener('resize', queuePin);
      window.visualViewport.addEventListener('scroll', queuePin);
      document.addEventListener('focusin', () => {
        if (!document.documentElement.classList.contains('un-kb')) return;
        pinFocusedInput(); // preempt the native reveal in the same task
        queuePin();        // and re-check after layout / any native scroll
      });
    }

    // (The hand-rolled delegated touch swipe engine that used to live here is
    // gone — swipe-to-delete is now the kit's attachSwipeActions, wired per
    // row in wireNative(). Without the kit, the ✕ buttons stay visible on
    // touch via the CSS gate in <head>.)

    // ---------- actions ----------
    async function addExercise(exerciseId) {
      await api('POST', '/api/sessions/' + session.id + '/exercises', { exercise_id: exerciseId });
      picker = null;
      await refreshSession();
    }

    document.addEventListener('click', (e) => {
      const el = e.target.closest('[data-action]');
      if (!el) return;
      const action = el.dataset.action;
      // backdrop closes only on a direct click, not clicks inside the sheet
      if ((action === 'close-picker' || action === 'close-import' || action === 'close-export' || action === 'close-muscle-editor' || action === 'close-bw-editor') && e.target !== el) return;
      handle(action, el).catch((err) => toast(err.message));
    });

    // Actions that navigate, mutate data, or open an edit surface commit any
    // pending swipe delete first, so lists stay consistent and a later
    // deferred refresh can't wipe in-progress typing.
    const FLUSH_BEFORE = new Set(['start-workout', 'open-session', 'back-home', 'delete-session', 'delete-entry', 'delete-set', 'pick-exercise', 'create-exercise', 'create-exercise-typed', 'open-add-set', 'edit-set', 'add-note', 'session-note', 'export-json', 'import-json', 'run-import', 'open-progress', 'open-exercise-chart', 'open-muscle-chart', 'chart-back', 'delete-history-entry', 'delete-exercise', 'delete-exercise-confirm']);

    async function handle(action, el) {
      if (FLUSH_BEFORE.has(action)) await flushPendingDelete();
      switch (action) {
        case 'start-workout': {
          const s = await api('POST', '/api/sessions');
          pendingNav = 'push';
          await openSession(s.id);
          break;
        }
        case 'open-session':
          pendingNav = 'push';
          await openSession(+el.dataset.id);
          break;
        case 'delete-session':
          // No confirm() here — the platform iframe suppresses blocking
          // dialogs (confirm silently returns false), which made the X
          // buttons dead. The undo window is the confirmation instead.
          startPendingDelete('session', +el.dataset.id);
          break;
        case 'back-home':
          openForm = null; editingNote = null; editingSessionNote = false; picker = null;
          progressHub = null; exerciseView = null; muscleView = null; muscleEditor = null; bwEditor = null;
          pendingNav = 'pop';
          await loadHome();
          break;
        case 'open-progress':
          pendingNav = 'push';
          await openProgress();
          break;
        case 'open-exercise-chart': {
          // Remember where we came from so Back returns there.
          const from = view === 'session' && session ? 'session:' + session.id
            : view === 'muscle' && muscleView ? 'muscle:' + muscleView.muscle
            : 'progress';
          pendingNav = 'push';
          await openExerciseChart(+el.dataset.id, from);
          break;
        }
        case 'open-muscle-chart':
          pendingNav = 'push';
          await openMuscleChart(el.dataset.muscle);
          break;
        case 'chart-metric':
          if (view === 'exercise' && exerciseView) exerciseView.metric = el.dataset.metric;
          else if (view === 'muscle' && muscleView) muscleView.metric = el.dataset.metric;
          render();
          break;
        case 'map-mode':
          // Repaint just the diagram slot so the progress search box keeps
          // its text/focus (same late-fill pattern as renderBodyDiagram).
          if (progressHub) { progressHub.mode = el.dataset.mode; renderBodyDiagram(); }
          break;
        case 'chart-back': {
          pendingNav = 'pop';
          if (view === 'muscle') { muscleView = null; await openProgress(); break; }
          const from = (exerciseView && exerciseView.from) || 'progress';
          exerciseView = null; muscleEditor = null;
          if (from.indexOf('session:') === 0) await openSession(+from.slice(8));
          else if (from.indexOf('muscle:') === 0) await openMuscleChart(from.slice(7));
          else await openProgress();
          break;
        }
        case 'edit-muscles':
          muscleEditor = { selected: [...(exerciseView.data.muscles || [])] };
          render();
          break;
        case 'toggle-muscle': {
          const m = el.dataset.muscle;
          const i = muscleEditor.selected.indexOf(m);
          if (i >= 0) muscleEditor.selected.splice(i, 1); else muscleEditor.selected.push(m);
          render();
          break;
        }
        case 'close-muscle-editor':
          muscleEditor = null;
          render();
          break;
        case 'save-muscles': {
          const r = await api('PATCH', '/api/exercises/' + exerciseView.data.id, { muscles: muscleEditor.selected });
          exerciseView.data.muscles = r.muscles;
          muscleEditor = null;
          render();
          break;
        }
        case 'open-bw-editor':
          bwEditor = true;
          pendingFocus = 'bw';
          render();
          break;
        case 'close-bw-editor':
          bwEditor = null;
          render();
          break;
        case 'save-bw': {
          const bi = document.getElementById('bw-input');
          const raw = ((bi && bi.value) || '').trim();
          let kg = null;
          if (raw !== '') {
            const n = Number(raw);
            if (!Number.isFinite(n) || n <= 0) { toast('Enter a valid bodyweight'); break; }
            kg = unitToKg(n); // input is in the display unit, stored in kg
          }
          const r = await api('PATCH', '/api/settings', { bodyweight_kg: kg });
          bodyweightKg = r.bodyweight_kg !== null ? parseFloat(r.bodyweight_kg) || null : null;
          bwEditor = null;
          render();
          break;
        }
        case 'open-picker': {
          picker = { query: '', list: [] };
          pendingFocus = 'picker';
          render();
          // The static catalog loads once per page; a failure just means no
          // "Suggested" section — the user's own list still works.
          const [list, cat] = await Promise.all([
            api('GET', '/api/exercises').then((r) => r.exercises),
            exCatalog ? Promise.resolve(exCatalog) : api('GET', '/api/exercise-catalog').then((r) => r.exercises).catch(() => []),
          ]);
          exCatalog = cat;
          if (picker) { picker.list = list; renderPickerList(); }
          break;
        }
        case 'close-picker':
          picker = null;
          render();
          break;
        case 'pick-exercise':
          await addExercise(+el.dataset.id);
          break;
        case 'create-exercise':
          // Step 1 of creating: reveal the reps/time choice (no write yet).
          picker.creating = picker.query.trim();
          renderPickerList();
          break;
        case 'create-exercise-typed': {
          const name = picker.creating || picker.query.trim();
          const ex = await api('POST', '/api/exercises', { name, exercise_type: el.dataset.type });
          await addExercise(ex.id);
          break;
        }
        case 'pick-suggested': {
          // Catalog suggestion: create-or-get under the canonical name; the
          // catalog's type and muscle tags apply only on a fresh insert.
          const ex = await api('POST', '/api/exercises', { name: el.dataset.name, exercise_type: el.dataset.type });
          await addExercise(ex.id);
          break;
        }
        case 'delete-entry':
          startPendingDelete('entry', +el.dataset.entry);
          break;
        case 'delete-history-entry':
          // Same undo-window confirmation as the other deletes (blocking
          // confirm() dialogs are suppressed in the platform iframe).
          startPendingDelete('hist', +el.dataset.session);
          break;
        case 'delete-exercise': {
          if (hasKit()) {
            // Native confirmation dialog (blocking confirm() is suppressed in
            // the platform iframe; the kit alert is async and iframe-safe).
            const d = exerciseView.data;
            const n = d.sessions.filter((s) => !isPendingDelete('hist', s.session_id)).length;
            const res = await unNative.alert({
              title: 'Delete “' + d.name + '”?',
              message: 'Its entire history' + (n ? ' (' + n + ' workout' + (n === 1 ? '' : 's') + ')' : '') + ' will be deleted. This can’t be undone.',
              buttons: [
                { label: 'Cancel', style: 'cancel' },
                { label: 'Delete everything', style: 'destructive' },
              ],
            });
            if (res && res.button && res.button.style === 'destructive' && exerciseView) {
              await handle('delete-exercise-confirm', el);
            }
          } else {
            exerciseView.confirmDelete = true;
            render();
          }
          break;
        }
        case 'delete-exercise-cancel':
          exerciseView.confirmDelete = false;
          render();
          break;
        case 'delete-exercise-confirm': {
          if (exerciseView.deleting) break;
          exerciseView.deleting = true;
          render();
          try {
            await api('DELETE', '/api/exercises/' + exerciseView.data.id);
          } catch (err) {
            exerciseView.deleting = false;
            render();
            throw err;
          }
          toast('Exercise deleted', true);
          await openProgress();
          break;
        }
        case 'add-note':
          editingNote = +el.dataset.entry;
          pendingFocus = 'entry-note';
          render();
          break;
        case 'open-add-set':
          openForm = { entryId: +el.dataset.entry, setId: null, draft: prefillDraft(+el.dataset.entry), error: '' };
          pendingFocus = 'set-form';
          render();
          break;
        case 'edit-set': {
          const en = findEntryLocal(+el.dataset.entry);
          const st = en.sets.find((x) => x.id === +el.dataset.set);
          openForm = { entryId: en.id, setId: st.id, draft: draftFromSet(st), error: '' };
          pendingFocus = 'set-form';
          render();
          break;
        }
        case 'cancel-set-form':
          openForm = null;
          render();
          break;
        case 'delete-set':
          await api('DELETE', '/api/sets/' + el.dataset.set);
          openForm = null;
          await refreshSession();
          break;
        case 'form-side': {
          const form = document.getElementById('set-form');
          if (form) openForm.draft = readDraft(form);
          openForm.draft.side = el.dataset.side;
          render();
          break;
        }
        case 'session-note':
          editingSessionNote = true;
          pendingFocus = 'session-note';
          render();
          break;
        case 'import-json':
          importSheet = { text: '', error: '', busy: false, specCopied: false };
          render();
          break;
        case 'copy-format-spec': {
          await copyText(IMPORT_FORMAT_SPEC);
          if (importSheet) {
            importSheet.specCopied = true;
            render();
            setTimeout(() => {
              if (importSheet && importSheet.specCopied) { importSheet.specCopied = false; render(); }
            }, 2000);
          }
          break;
        }
        case 'close-import':
          importSheet = null;
          render();
          break;
        case 'run-import': {
          const ta = document.getElementById('import-text');
          const text = (ta ? ta.value : importSheet.text).trim();
          if (ta) importSheet.text = ta.value;
          if (!text) { importSheet.error = 'Paste JSON or choose a file first.'; render(); break; }
          let payload;
          try { payload = JSON.parse(text); }
          catch (_) { importSheet.error = 'That isn’t valid JSON — check the file or paste.'; render(); break; }
          importSheet.busy = true; importSheet.error = ''; render();
          try {
            const r = await api('POST', '/api/import', payload);
            importSheet = null;
            await loadHome();
            const parts = ['Imported ' + r.imported + ' workout' + (r.imported === 1 ? '' : 's')];
            if (r.skipped) parts.push(r.skipped + ' skipped as already present');
            toast(parts.join(' — '), true);
          } catch (err) {
            importSheet.busy = false;
            importSheet.error = err.message;
            render();
          }
          break;
        }
        case 'reset-stopwatch':
          stopwatchStart = Date.now();
          tick();
          break;
        case 'set-theme':
          setThemePref(el.dataset.theme);
          applyTheme();
          render();
          break;
        case 'set-unit': {
          const u = el.dataset.unit;
          if (u === weightUnit) break;
          // An open set form holds a weight in the old unit — re-express it
          // in the new one (via the exact kg when the field is untouched).
          const form = document.getElementById('set-form');
          if (form && openForm) {
            const d = readDraft(form);
            const n = Number(d.weight);
            if (d.type === 'reps' && d.weight.trim() !== '' && Number.isFinite(n)) {
              d.weightKg = draftWeightKg(d);
              d.weight = String(kgToUnitNum(d.weightKg, u));
            }
            openForm.draft = d;
          }
          weightUnit = u;
          render();
          api('PATCH', '/api/settings', { weight_unit: u }).catch((err) => toast(err.message));
          break;
        }
        case 'undo-delete':
          undoPendingDelete();
          break;
        case 'export-json':
          await openExportSheet();
          break;
        case 'download-export':
          downloadExport();
          break;
        case 'copy-export': {
          await copyText(exportSheet.text);
          exportSheet.copied = true;
          render();
          setTimeout(() => {
            if (exportSheet && exportSheet.copied) { exportSheet.copied = false; render(); }
          }, 1500);
          break;
        }
        case 'close-export':
          exportSheet = null;
          render();
          break;
      }
    }

    // ?import=1 deep-links straight to the import sheet (also lets the
    // proposal checks exercise it, since tests can only navigate routes).
    if (params.get('import') === '1') importSheet = { text: '', error: '', busy: false, specCopied: false };

    // The unit preference must be known before the first weights render.
    (async () => {
      try {
        const st = await api('GET', '/api/settings');
        weightUnit = st.weight_unit === 'lbs' ? 'lbs' : 'kg';
        bodyweightKg = st.bodyweight_kg !== null && st.bodyweight_kg !== undefined ? parseFloat(st.bodyweight_kg) || null : null;
      }
      catch (_) {} // default to kg / no bodyweight — never block the app on the setting
      // ?session=<id> deep-links straight into that session's view, and
      // &picker=1 also opens the add-exercise sheet — like ?import=1, this
      // lets the proposal checks reach screens that otherwise need clicks.
      const deepSession = parseInt(params.get('session') || '', 10);
      if (deepSession) {
        try {
          await openSession(deepSession);
          if (params.get('picker') === '1') {
            await handle('open-picker', null);
            // &pickerq=<text> pre-fills the picker search — lets the
            // proposal checks exercise the catalog autocomplete.
            const pq = params.get('pickerq');
            if (pq && picker) {
              picker.query = pq;
              const si = document.getElementById('picker-search');
              if (si) si.value = pq;
              renderPickerList();
            }
          }
          // &addset=1 opens the add-set form on the first exercise that has
          // sets — lets the proposal checks assert on the set form (drop-set
          // switch and friends) without clicks.
          if (params.get('addset') === '1' && session && session.entries.length) {
            const en = session.entries.find((x) => x.sets.length) || session.entries[0];
            await handle('open-add-set', { dataset: { entry: String(en.id) } });
          }
          return;
        } catch (_) {} // unknown/foreign session — fall through to home
      }
      // ?progress=1 / ?exercise=<id> / ?muscle=<slug> deep-link into the
      // Progress area — used by the proposal checks like ?session above.
      if (params.get('progress') === '1') {
        try {
          await openProgress();
          // &freq=1 pre-selects the body map's Frequency mode — lets the
          // proposal checks assert on the frequency legend.
          if (params.get('freq') === '1' && progressHub) { progressHub.mode = 'freq'; renderBodyDiagram(); }
          return;
        } catch (_) {}
      }
      const deepExercise = parseInt(params.get('exercise') || '', 10);
      if (deepExercise) {
        try { await openExerciseChart(deepExercise, 'progress'); return; } catch (_) {}
      }
      const deepMuscle = params.get('muscle');
      if (deepMuscle) {
        try { await openMuscleChart(deepMuscle); return; } catch (_) {}
      }
      await loadHome();
      // ?export=1 deep-links straight to the export sheet — like ?import=1,
      // it lets the proposal checks exercise the sheet without clicks.
      if (params.get('export') === '1') await openExportSheet();
    })().catch((err) => toast(err.message));
  </script>
</body>
</html>

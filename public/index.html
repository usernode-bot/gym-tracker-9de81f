<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-visual">
  <!-- Inline data-URI favicon: prevents the browser's automatic /favicon.ico
       request (which would hit the auth-gated catch-all and 401). -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='64'%20height='64'%20viewBox='0%200%2064%2064'%3E%3Crect%20width='64'%20height='64'%20rx='14'%20fill='%237c3aed'/%3E%3Ctext%20x='32'%20y='34'%20font-size='34'%20text-anchor='middle'%20dominant-baseline='central'%3E%F0%9F%8F%8B%EF%B8%8F%3C/text%3E%3C/svg%3E">

  <script>
  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(v); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = {
          sentinel: S,
          level: level,
          args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }),
          ts: Date.now(),
          url: location.href,
        };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(payload, '*');
        }
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason;
      var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });
    try { post('info', ['[dev-console ready]'], { kind: 'ready' }); } catch (_) {}
  })();
  </script>
  <title>Gym Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class', future: { hoverOnlyWhenSupported: true } }</script>

  <!-- usernode-native UI kit — centrally hosted, never vendored. Loading it
       sets html.un-ios / .un-android / .un-desktop and exposes
       window.unNative; every use below is guarded so the app still works
       (legacy markup + visible ✕ delete buttons) if these fail to load. -->
  <link rel="stylesheet" href="https://social-vibecoding.usernodelabs.org/usernode-native/v1/native.css">
  <script src="https://social-vibecoding.usernodelabs.org/usernode-native/v1/native.js"></script>

  <style>
    /* Without the kit, touch devices have no swipe gesture anymore, so the
       ✕ delete buttons must stay visible there; with the kit (html carries
       a un-* platform class) swipe-to-delete covers touch and the ✕s hide.
       Gated on the primary pointer (not viewport width) so a narrow
       desktop window — where swipe doesn't exist — keeps its Xs. */
    @media (hover: none) and (pointer: coarse) {
      html.un-ios .x-delete, html.un-android .x-delete { display: none; }
      /* iOS Safari auto-zooms the page when a focused input's computed
         font-size is below 16px — the !important beats Tailwind's
         .text-sm/.text-xs so touch devices never trigger that zoom.
         Desktop keeps its denser 14px inputs. */
      input, textarea, select { font-size: 16px !important; }
    }
    /* Fixed app shell (issue #34): the document itself never scrolls —
       #scroll is the app's only scroller. With the window scroller dead,
       focusing an input can't jump the page frame; the browser's
       reveal-on-focus scrolls only the inner container, like a native
       list sliding under a fixed header. */
    html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
    #scroll {
      position: fixed;
      inset: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
    }
    /* While the keyboard is up, let bottom-of-page inputs scroll clear of
       it (kit-maintained inset; resolves to nothing without the kit). */
    html.un-kb #scroll { padding-bottom: var(--un-kb-inset, 0px); }
    @media (prefers-reduced-motion: no-preference) {
      #scroll { transition: padding-bottom 150ms ease-out; }
    }
    /* Bottom-anchored UI rides above the on-screen keyboard. --un-kb-inset
       is the keyboard's occlusion of the layout viewport in px, maintained
       by the kit (apps are sanctioned to consume it for their own fixed
       bottom bars); with interactive-widget=resizes-visual the keyboard
       overlays the layout viewport on all platforms, so this inset is the
       single mechanism that lifts bottom UI clear of it. Without the kit it
       resolves to 0px — plain bottom anchoring.
       env(safe-area-inset-bottom) joins in now that viewport-fit=cover. */
    .sheet {
      bottom: var(--un-kb-inset, 0px);
      padding-bottom: calc(1rem + env(safe-area-inset-bottom, 0px));
    }
    .kb-bottom-4 { bottom: calc(1rem + var(--un-kb-inset, 0px) + env(safe-area-inset-bottom, 0px)); }
    .kb-bottom-16 { bottom: calc(4rem + var(--un-kb-inset, 0px) + env(safe-area-inset-bottom, 0px)); }
    @media (prefers-reduced-motion: no-preference) {
      .sheet, .kb-bottom-4, .kb-bottom-16 { transition: bottom 150ms ease-out; }
    }

    /* ── usernode-native kit integration ─────────────────────────────── */
    /* Theme the kit to the app's violet; radius matches rounded-xl. */
    :root {
      --un-accent: #7c3aed;
      --un-radius-card: 0.75rem;
    }
    /* .un-sheet sets user-select:none for the drag gesture — keep text
       entry/selection working in fields inside sheet content. */
    .un-sheet input, .un-sheet textarea {
      user-select: text;
      -webkit-user-select: text;
    }
    /* The kit nav bar is fixed — clear it (44px + notch inset). */
    html.un-ios #app, html.un-android #app, html.un-desktop #app {
      padding-top: calc(48px + env(safe-area-inset-top, 0px));
    }
  </style>

  <!-- Theme bootstrap: apply the stored preference (light/dark/system,
       default system) before first paint to avoid a wrong-theme flash. -->
  <script>
  (function () {
    var pref = 'system';
    try {
      var stored = localStorage.getItem('gym-tracker-theme');
      if (stored === 'light' || stored === 'dark' || stored === 'system') pref = stored;
    } catch (_) {}
    var dark = pref === 'dark' ||
      (pref === 'system' && window.matchMedia &&
       window.matchMedia('(prefers-color-scheme: dark)').matches);
    document.documentElement.classList.toggle('dark', dark);
  })();
  </script>

</head>
<body class="bg-white text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100">
  <div id="scroll">
    <div id="app" class="w-full max-w-md mx-auto px-4 pb-28"></div>
  </div>
  <div id="toast" class="hidden fixed top-3 left-1/2 -translate-x-1/2 bg-red-500/90 text-white text-sm px-4 py-2 rounded-lg z-50 max-w-[90%] text-center shadow-lg"></div>
  <!-- No-kit fallback only: with the kit, the undo window is a priority
       action toast (unNative.toast in startPendingDelete). -->
  <div id="undo-toast" class="hidden fixed kb-bottom-16 left-1/2 -translate-x-1/2 z-40 flex items-center gap-1 bg-zinc-800 text-zinc-100 dark:bg-zinc-100 dark:text-zinc-900 text-sm pl-4 pr-1.5 py-1.5 rounded-full shadow-lg max-w-[90%]">
    <span id="undo-toast-msg"></span>
    <button data-action="undo-delete" class="font-semibold text-violet-300 dark:text-violet-700 px-2.5 py-1 rounded-full">Undo</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    const demo = params.get('demo') === '1';
    const authHeaders = token ? { 'x-usernode-token': token } : {};

    // ---------- state ----------
    let view = 'home';        // 'home' | 'session'
    let sessions = [];        // home list
    let session = null;       // session detail payload
    let picker = null;        // { query, list } when the add-exercise sheet is open
    let exCatalog = null;     // standardized exercise catalog (fetched once, static)
    let openForm = null;      // { entryId, setId|null, draft, error } for the set form
    let pendingFocus = null;  // one-shot: which just-opened surface wireInputs should autofocus on the next render ('set-form' | 'entry-note' | 'session-note' | 'picker' | 'bw')
    let editingNote = null;   // entry id whose note input is open
    let editingSessionNote = false; // the workout-level note input is open
    let importSheet = null;   // { text, error, busy } while the import sheet is open
    let exportSheet = null;   // { text, filename, count, copied } while the export sheet is open
    let progressHub = null;   // { query, list, strength } — Progress hub exercise list + per-muscle scores
    let exerciseView = null;  // { data, metric, from, confirmDelete, deleting } — per-exercise chart screen
    let muscleView = null;    // { muscle, data, metric } — per-muscle chart screen
    let muscleEditor = null;  // { selected } while the muscle tag-edit sheet is open
    let bwEditor = null;      // truthy while the bodyweight sheet is open
    let weightUnit = 'kg';    // display unit ('kg' | 'lbs'); weights are always stored in kg
    let bodyweightKg = null;  // bodyweight in kg (null = unset; strength levels hidden)
    let stopwatchStart = null; // epoch ms of last logged set / manual reset, or null (idle)
    let toastTimer = null;
    let pendingDelete = null;    // { kind: 'session'|'entry'|'set'|'hist', id, entryIds, timer } — deferred swipe delete in its undo window ('hist' = history row keyed by session id, deleting its entryIds)
    let needsRefreshOnShow = false; // a keepalive flush happened while hidden; reload on return
    let pendingNav = null;       // 'push' | 'pop' — consumed by the next render() as a kit screen transition

    // usernode-native kit presence. The kit script is loaded synchronously in
    // <head>, so this is stable by the time any of the code below runs; every
    // kit feature degrades to the legacy markup/behavior when it's absent.
    function hasKit() { return !!window.unNative; }

    // ---------- theme ----------
    const THEME_KEY = 'gym-tracker-theme';
    const themeMq = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;
    function getThemePref() {
      try {
        const v = localStorage.getItem(THEME_KEY);
        if (v === 'light' || v === 'dark' || v === 'system') return v;
      } catch (_) {}
      return 'system';
    }
    function setThemePref(v) {
      try {
        if (v === 'system') localStorage.removeItem(THEME_KEY);
        else localStorage.setItem(THEME_KEY, v);
      } catch (_) {}
    }
    function applyTheme() {
      const pref = getThemePref();
      const dark = pref === 'dark' || (pref === 'system' && themeMq && themeMq.matches);
      document.documentElement.classList.toggle('dark', dark);
    }
    // Follow the OS live, but only while the user hasn't set an explicit choice.
    if (themeMq) {
      const onSystemChange = () => { if (getThemePref() === 'system') applyTheme(); };
      if (themeMq.addEventListener) themeMq.addEventListener('change', onSystemChange);
      else if (themeMq.addListener) themeMq.addListener(onSystemChange);
    }

    // ---------- helpers ----------
    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function fmtDate(ts) {
      const d = new Date(ts);
      return d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' }) +
        ' · ' + d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    }
    function fmtDateShort(ts) {
      return new Date(ts).toLocaleDateString([], { month: 'short', day: 'numeric' });
    }
    // Weights are stored in kg; convert only for display / input. lbs are
    // shown to 1 decimal, and lbs input is rounded to 2 decimals of kg
    // (matching the column's NUMERIC(7,2)) before saving.
    const LBS_PER_KG = 2.20462;
    function kgToUnitNum(kg, unit) {
      const n = parseFloat(kg);
      if (!Number.isFinite(n)) return NaN;
      return (unit || weightUnit) === 'lbs' ? Math.round(n * LBS_PER_KG * 10) / 10 : n;
    }
    function unitToKg(n) {
      return weightUnit === 'lbs' ? Math.round((n / LBS_PER_KG) * 100) / 100 : n;
    }
    function fmtW(w) {
      const n = kgToUnitNum(w);
      return Number.isFinite(n) ? String(n) : String(w);
    }
    function fmtDur(s) {
      return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
    }
    function parseDur(v) {
      const t = String(v || '').trim();
      if (/^\d+$/.test(t)) return parseInt(t, 10);
      const m = t.match(/^(\d+):([0-5]?\d)$/);
      if (m) return parseInt(m[1], 10) * 60 + parseInt(m[2], 10);
      return NaN;
    }
    function fmtSet(s) {
      const side = s.side === 'left' ? 'L ' : s.side === 'right' ? 'R ' : '';
      if (s.set_type === 'reps') return side + s.reps + ' × ' + fmtW(s.weight) + ' ' + weightUnit;
      return side + fmtDur(s.duration_seconds) + (s.effort ? ' · ' + s.effort : '');
    }
    // One-line summary of a set list where drop sets chain onto their parent:
    // "10 × 60 ↘ 8 × 50, 8 × 55"
    function fmtSetList(sets) {
      return sets.map((s, i) => (i ? (s.is_drop ? ' ↘ ' : ', ') : '') + fmtSet(s)).join('');
    }
    function toast(msg, ok) {
      // The kit toast is a singleton (last-writer-wins) among ordinary
      // toasts — right for transient status. The undo window uses a
      // *priority* kit toast (see startPendingDelete), which ordinary
      // toasts queue behind instead of displacing, so an error toast can
      // never silently eat an undo window.
      if (hasKit()) { unNative.toast(msg); return; }
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.toggle('bg-red-500/90', !ok);
      t.classList.toggle('bg-emerald-600/90', !!ok);
      t.classList.remove('hidden');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.add('hidden'), 3500);
    }

    async function api(method, url, body) {
      if (method === 'GET' && demo) url += (url.includes('?') ? '&' : '?') + 'demo=1';
      const res = await fetch(url, {
        method,
        headers: { ...(body ? { 'Content-Type': 'application/json' } : {}), ...authHeaders },
        body: body ? JSON.stringify(body) : undefined,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'Request failed (' + res.status + ')');
      return data;
    }

    // ---------- rendering ----------
    const inp = 'bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-700 rounded-lg px-2.5 py-1.5 text-sm outline-none focus:border-violet-500';

    // ---------- progress / muscle constants ----------
    const MUSCLE_LABELS = { chest: 'Chest', back: 'Back', shoulders: 'Shoulders', biceps: 'Biceps', triceps: 'Triceps', quads: 'Quads', hamstrings: 'Hamstrings', glutes: 'Glutes', calves: 'Calves', core: 'Core', forearms: 'Forearms' };
    const MUSCLE_SLUGS = Object.keys(MUSCLE_LABELS);
    const METRIC_LABELS = { maxw: 'Max weight', vol: 'Volume', e1rm: 'Est. 1RM', maxdur: 'Longest set', totaldur: 'Total time', sets: 'Sets' };

    // Strength-level thresholds: multiples of bodyweight applied to the
    // muscle's current Est. 1RM — [novice, intermediate, advanced]; any score
    // below novice = beginner, no live score = unrated. Heuristics anchored
    // to each muscle's classic lift (bench, squat, deadlift, OHP, …).
    const STRENGTH_THRESHOLDS = {
      chest: [0.60, 1.00, 1.50], back: [0.90, 1.40, 2.00], shoulders: [0.40, 0.65, 0.95],
      biceps: [0.30, 0.50, 0.75], triceps: [0.50, 0.85, 1.25], quads: [0.75, 1.25, 1.75],
      hamstrings: [0.90, 1.40, 2.00], glutes: [1.00, 1.50, 2.25], calves: [1.00, 1.50, 2.25],
      core: [0.30, 0.50, 0.75], forearms: [0.30, 0.50, 0.75],
    };
    const LEVEL_LABELS = ['Beginner', 'Novice', 'Intermediate', 'Advanced'];
    // Sequential single-hue ramp, one entry per level (light / dark). Dark
    // mode inverts lightness so "deeper = stronger" reads on both themes.
    const LEVEL_FILLS = [
      'fill-violet-200 dark:fill-violet-900',
      'fill-violet-400 dark:fill-violet-700',
      'fill-violet-600 dark:fill-violet-500',
      'fill-violet-800 dark:fill-violet-300',
    ];
    const LEVEL_DOTS = [
      'bg-violet-200 dark:bg-violet-900',
      'bg-violet-400 dark:bg-violet-700',
      'bg-violet-600 dark:bg-violet-500',
      'bg-violet-800 dark:bg-violet-300',
    ];

    // Training-frequency ("growth") states: avg sets/week per muscle over a
    // rolling 4-week window, all set shapes counted. Thresholds follow the
    // common hypertrophy guidance of ~10+ weekly sets for growth; 4–9 holds
    // or slowly builds. States: 0 = Not trained, 1 = Low, 2 = Maintaining,
    // 3 = On track. Needs no bodyweight, unlike the strength levels.
    const FREQ_WINDOW_DAYS = 28;
    const FREQ_WINDOW_MS = FREQ_WINDOW_DAYS * 24 * 3600 * 1000;
    const FREQ_THRESHOLDS = [4, 10]; // sets/week: [maintaining, on-track]
    const FREQ_LABELS = ['Not trained', 'Low', 'Maintaining', 'On track'];
    // Emerald single-hue ramp (state 0 stays neutral zinc, like unrated
    // muscles in strength mode); dark mode inverts lightness so
    // "deeper = more trained" reads on both themes.
    const FREQ_FILLS = [
      'fill-zinc-400 dark:fill-zinc-600',
      'fill-emerald-300 dark:fill-emerald-900',
      'fill-emerald-500 dark:fill-emerald-700',
      'fill-emerald-700 dark:fill-emerald-500',
    ];
    const FREQ_DOTS = [
      'bg-zinc-300 dark:bg-zinc-700',
      'bg-emerald-300 dark:bg-emerald-900',
      'bg-emerald-500 dark:bg-emerald-700',
      'bg-emerald-700 dark:bg-emerald-500',
    ];
    // Pill badge for the drill-in status line, one entry per state (mirrors
    // the violet level badge's tinted-pill style).
    const FREQ_BADGES = [
      'bg-zinc-500/10 text-zinc-500 dark:text-zinc-400',
      'bg-emerald-600/10 text-emerald-700 dark:text-emerald-300',
      'bg-emerald-600/15 text-emerald-700 dark:text-emerald-300',
      'bg-emerald-600/25 text-emerald-800 dark:text-emerald-200',
    ];

    function freqState(setsPerWeek) {
      return setsPerWeek >= FREQ_THRESHOLDS[1] ? 3
        : setsPerWeek >= FREQ_THRESHOLDS[0] ? 2
        : setsPerWeek > 0 ? 1 : 0;
    }

    function strengthLevel(muscle, scoreKg, bwKg) {
      const th = STRENGTH_THRESHOLDS[muscle];
      if (!th || !(scoreKg > 0) || !(bwKg > 0)) return null;
      const r = scoreKg / bwKg;
      const level = r >= th[2] ? 3 : r >= th[1] ? 2 : r >= th[0] ? 1 : 0;
      return { level, label: LEVEL_LABELS[level] };
    }

    function themeSwitcherHtml() {
      const pref = getThemePref();
      const opt = (t, label, icon) => `<button type="button" data-action="set-theme" data-theme="${t}" title="${label}" aria-label="${label}" aria-pressed="${pref === t}" class="px-2 py-1 text-sm leading-none transition-colors ${pref === t ? 'bg-violet-600 text-white' : 'text-zinc-500 hover:text-zinc-800 dark:text-zinc-400 dark:hover:text-zinc-100'}">${icon}</button>`;
      return `<div class="flex rounded-lg overflow-hidden border border-zinc-200 dark:border-zinc-700">
        ${opt('light', 'Light', '☀')}${opt('dark', 'Dark', '☾')}${opt('system', 'System', '◐')}
      </div>`;
    }

    function unitSwitcherHtml() {
      const opt = (u) => `<button type="button" data-action="set-unit" data-unit="${u}" title="Show weights in ${u}" aria-pressed="${weightUnit === u}" class="px-2 py-1 text-xs leading-none transition-colors ${weightUnit === u ? 'bg-violet-600 text-white' : 'text-zinc-500 hover:text-zinc-800 dark:text-zinc-400 dark:hover:text-zinc-100'}">${u}</button>`;
      return `<div class="flex rounded-lg overflow-hidden border border-zinc-200 dark:border-zinc-700">${opt('kg')}${opt('lbs')}</div>`;
    }

    // Shared screen header. Kit: fixed blurred un-navbar (+ collapsing large
    // title on the root screen), wired by wireNative(). Legacy: the previous
    // in-flow <header>. `backAction` null means root screen (no back button).
    function headerHtml({ title, subtitle, backAction, right, large }) {
      if (hasKit()) {
        const back = backAction
          ? `<button data-action="${backAction}" class="un-navbar-back un-touch-target shrink-0">Back</button>`
          : '<span class="w-12 shrink-0"></span>';
        return `<div id="un-navbar" class="un-navbar">
            <div class="w-full max-w-md mx-auto flex items-center gap-1 min-w-0">
              ${back}
              <div class="un-navbar-title">${title}</div>
              <div class="flex items-center gap-2 shrink-0">${right || ''}</div>
            </div>
          </div>
          ${large ? `<h1 id="un-large-title" class="un-navbar-large" style="padding-left:0;padding-right:0">${title}</h1>` : ''}
          ${subtitle ? `<div class="text-xs text-zinc-500 ${large ? '-mt-1' : 'pt-2'} mb-3">${subtitle}</div>` : `<div class="${large ? '' : 'pt-2'} mb-2"></div>`}`;
      }
      if (!backAction) {
        return `<header class="flex items-center justify-between gap-2 py-5">
          <h1 class="text-2xl font-bold">${title}</h1>
          <div class="flex items-center gap-2">${right || ''}</div>
        </header>`;
      }
      return `<header class="flex items-center gap-2 py-4">
        <button data-action="${backAction}" class="px-2 py-1 rounded-lg text-zinc-500 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-100 text-lg">‹ Back</button>
        <div class="ml-1 flex-1 min-w-0">
          <div class="font-semibold truncate">${title}</div>
          ${subtitle ? `<div class="text-xs text-zinc-500">${subtitle}</div>` : ''}
        </div>
        ${right || ''}
      </header>`;
    }


    function homeHtml() {
      const visible = sessions.filter((s) => !isPendingDelete('session', s.id));
      // Kit: bare rows inside an inset-grouped .un-group card (the kit's
      // swipe wrapper + hairline separators do the rest). Legacy: each row
      // is its own bordered card with a visible ✕ button.
      const rowCls = hasKit()
        ? 'un-group-row relative flex items-stretch overflow-hidden'
        : 'relative flex items-stretch rounded-xl bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 overflow-hidden';
      const rows = visible.length ? visible.map((s) => `
          <div data-swipe="session:${s.id}" class="${rowCls}">
            <button data-action="open-session" data-id="${s.id}" class="flex-1 text-left px-4 py-3 hover:bg-zinc-100 dark:hover:bg-zinc-800/60 min-w-0">
              <div class="font-medium">${fmtDate(s.started_at)}</div>
              <div class="text-sm text-zinc-500 mt-0.5">${s.exercise_count} exercise${s.exercise_count === 1 ? '' : 's'} · ${s.set_count} set${s.set_count === 1 ? '' : 's'}</div>
              ${s.exercise_names ? `<div class="text-xs text-zinc-500 dark:text-zinc-600 truncate mt-0.5">${esc(s.exercise_names)}</div>` : ''}
              ${s.note ? `<div class="text-xs italic text-amber-700 dark:text-amber-200/80 truncate mt-0.5">${esc(s.note)}</div>` : ''}
            </button>
            <button data-action="delete-session" data-id="${s.id}" class="x-delete un-touch-target px-3 text-zinc-400 dark:text-zinc-600 hover:text-red-500 dark:hover:text-red-400" title="Delete workout">✕</button>
          </div>`).join('')
        : '<div class="text-center text-zinc-500 dark:text-zinc-600 py-12">No workouts yet — start your first one!</div>';
      const list = visible.length && hasKit()
        ? `<div class="un-group">${rows}</div>`
        : `<div class="space-y-2">${rows}</div>`;
      return `
        ${headerHtml({ title: '🏋️ Gym Tracker', backAction: null, large: true, right: unitSwitcherHtml() + themeSwitcherHtml() })}
        <button data-action="start-workout" class="w-full py-3.5 rounded-xl bg-violet-600 hover:bg-violet-500 ${hasKit() ? '' : 'active:scale-[.99] transition-all'} font-semibold text-white shadow-lg shadow-violet-600/20 mb-2">+ Start workout</button>
        <button data-action="open-progress" class="w-full py-3 rounded-xl bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 hover:bg-zinc-100 dark:hover:bg-zinc-800/60 font-medium mb-5">📈 Progress</button>
        ${list}
        <div class="flex justify-center gap-6 mt-6">
          <button data-action="export-json" class="un-touch-target text-xs text-zinc-500 hover:text-zinc-700 dark:text-zinc-600 dark:hover:text-zinc-400 px-2 py-1">Export JSON</button>
          <button data-action="import-json" class="un-touch-target text-xs text-zinc-500 hover:text-zinc-700 dark:text-zinc-600 dark:hover:text-zinc-400 px-2 py-1">Import JSON</button>
        </div>
        ${!hasKit() && importSheet ? importSheetHtml() : ''}${!hasKit() && exportSheet ? exportSheetHtml() : ''}`;
    }

    function setFormHtml() {
      // No type toggle here: the fields' shape is fixed by the exercise's
      // type (or, when editing a legacy mismatched set, by the set's own).
      const d = openForm.draft;
      const fields = d.type === 'reps'
        ? `<div class="flex gap-2 mt-2">
             <input name="reps" type="number" min="1" step="1" inputmode="numeric" value="${esc(d.reps)}" placeholder="reps" class="${inp} w-1/2 min-w-0">
             <div class="relative w-1/2 min-w-0">
               <input name="weight" type="number" min="0" step="any" inputmode="decimal" value="${esc(d.weight)}" placeholder="weight (${weightUnit})" class="${inp} w-full pr-9">
               <span class="absolute right-2.5 top-1/2 -translate-y-1/2 text-xs text-zinc-400 dark:text-zinc-500 pointer-events-none">${weightUnit}</span>
             </div>
           </div>`
        : `<div class="flex gap-2 mt-2">
             <input name="duration" value="${esc(d.duration)}" placeholder="mm:ss or sec" autocomplete="off" class="${inp} w-1/2 min-w-0">
             <input name="effort" value="${esc(d.effort)}" placeholder="effort (level 8…)" maxlength="120" autocomplete="off" class="${inp} w-1/2 min-w-0">
           </div>`;
      // Side applies to both shapes; the drop toggle only makes sense once the
      // entry has a set to drop from (or when unflagging an existing drop set).
      const en = findEntryLocal(openForm.entryId);
      const others = en ? en.sets.filter((s) => !isPendingDelete('set', s.id)) : [];
      const pos = openForm.setId ? others.findIndex((s) => s.id === openForm.setId) : others.length;
      const showDrop = pos > 0 || d.drop;
      const sideBtn = (v, label) => `<button type="button" data-action="form-side" data-side="${v}" class="flex-1 py-1 rounded-lg text-xs transition-colors ${(d.side || '') === v ? 'bg-violet-600 text-white' : 'bg-zinc-200 text-zinc-600 dark:bg-zinc-800 dark:text-zinc-400'}">${label}</button>`;
      return `<form id="set-form" class="mt-2 rounded-xl bg-zinc-100 dark:bg-zinc-800/70 border border-zinc-200 dark:border-zinc-700 p-2.5">
        ${fields}
        <div class="flex items-center gap-2 mt-2">
          <div class="flex gap-1 flex-1">${sideBtn('', 'Both')}${sideBtn('left', 'L')}${sideBtn('right', 'R')}</div>
          ${showDrop ? `<label class="flex items-center gap-1.5 text-xs text-zinc-600 dark:text-zinc-400 whitespace-nowrap">↘ Drop set <input type="checkbox" name="drop" ${d.drop ? 'checked' : ''} class="${hasKit() ? 'un-switch' : 'accent-violet-600'}"></label>` : ''}
        </div>
        <input name="note" value="${esc(d.note)}" placeholder="note (optional)" maxlength="500" autocomplete="off" class="${inp} w-full mt-2">
        ${openForm.error ? `<div class="text-red-600 dark:text-red-400 text-xs mt-1.5">${esc(openForm.error)}</div>` : ''}
        <div class="flex items-center gap-2 mt-2">
          <button type="submit" class="flex-1 py-2 rounded-lg bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium">${openForm.setId ? 'Save' : 'Log set'}</button>
          <button type="button" data-action="cancel-set-form" class="px-3 py-2 rounded-lg bg-zinc-200 dark:bg-zinc-700/60 text-sm">Cancel</button>
          ${openForm.setId ? `<button type="button" data-action="delete-set" data-set="${openForm.setId}" class="px-3 py-2 rounded-lg text-red-600 dark:text-red-400 text-sm" title="Delete set">Delete</button>` : ''}
        </div>
      </form>`;
    }

    function entryHtml(en) {
      const noteHtml = editingNote === en.id
        ? `<input id="entry-note-input" data-entry="${en.id}" value="${esc(en.note || '')}" placeholder="Add a note…" maxlength="500" autocomplete="off" class="${inp} w-full mt-1.5">`
        : en.note
          ? `<button data-action="add-note" data-entry="${en.id}" class="block w-full text-left mt-1 text-sm italic text-amber-700 dark:text-amber-200/80">${esc(en.note)}</button>`
          : `<button data-action="add-note" data-entry="${en.id}" class="un-touch-target mt-0.5 text-xs text-zinc-500 hover:text-zinc-700 dark:text-zinc-600 dark:hover:text-zinc-400">＋ note</button>`;
      const lt = en.last_time
        ? `<div class="mt-1.5 text-xs text-zinc-600 dark:text-zinc-400 bg-zinc-100 dark:bg-zinc-800/50 rounded-lg px-2.5 py-1.5">Last time · ${fmtDateShort(en.last_time.started_at)} — <span class="font-mono">${esc(fmtSetList(en.last_time.sets))}</span></div>`
        : '';
      // Drop sets chain onto the previous set: they don't advance the set
      // number and show a ↘ marker in the number slot instead.
      let setNum = 0;
      const setRows = en.sets.filter((s) => !isPendingDelete('set', s.id)).map((s) => {
        if (!s.is_drop) setNum++;
        if (openForm && openForm.setId === s.id) return setFormHtml();
        return `<button data-swipe="set:${s.id}" data-action="edit-set" data-entry="${en.id}" data-set="${s.id}" class="relative w-full flex items-baseline gap-3 px-2.5 py-1.5 rounded-lg bg-zinc-50 dark:bg-zinc-900 hover:bg-zinc-100 dark:hover:bg-zinc-800/60 text-left">
            <span class="text-xs ${s.is_drop ? 'text-violet-500 dark:text-violet-400' : 'text-zinc-400 dark:text-zinc-600'} w-4 shrink-0">${s.is_drop ? '↘' : setNum}</span>
            <span class="font-mono">${esc(fmtSet(s))}</span>
            ${s.note ? `<span class="text-xs italic text-zinc-500 truncate">${esc(s.note)}</span>` : ''}
          </button>`;
      }).join('');
      const addArea = openForm && openForm.entryId === en.id && !openForm.setId
        ? setFormHtml()
        : `<button data-action="open-add-set" data-entry="${en.id}" class="un-touch-target mt-1 text-sm text-violet-600 dark:text-violet-400 hover:text-violet-700 dark:hover:text-violet-300 px-2.5 py-1">+ Add set</button>`;
      return `<div data-swipe="entry:${en.id}" class="relative rounded-xl bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 p-3">
          <div class="flex items-center justify-between gap-2">
            <button data-action="open-exercise-chart" data-id="${en.exercise_id}" title="View progress" class="font-semibold text-left min-w-0 truncate hover:text-violet-700 dark:hover:text-violet-300">${esc(en.name)} <span class="text-xs opacity-70">📈</span></button>
            <button data-action="delete-entry" data-entry="${en.id}" class="x-delete un-touch-target text-zinc-400 dark:text-zinc-600 hover:text-red-500 dark:hover:text-red-400 px-1" title="Remove exercise">✕</button>
          </div>
          ${noteHtml}
          ${lt}
          <div class="mt-2">${setRows}</div>
          ${addArea}
        </div>`;
    }

    // Each sheet is split into a body (shared) and a legacy wrapper: with the
    // kit the body is presented via unNative.presentSheet (grabber +
    // drag-to-dismiss, managed by syncSheets); without it the wrapper renders
    // the old fixed backdrop + bottom panel inline in the view.
    function legacySheetWrap(closeAction, body, { maxH = '85dvh', cls = '' } = {}) {
      return `<div data-action="${closeAction}" class="fixed inset-0 bg-black/60 z-20">
        <div class="sheet absolute inset-x-0 mx-auto w-full max-w-md bg-white dark:bg-zinc-900 border-t border-zinc-200 dark:border-zinc-700 rounded-t-2xl p-4 ${cls}" style="max-height:max(12rem, calc(${maxH} - var(--un-kb-inset, 0px)))">${body}</div>
      </div>`;
    }

    function importSheetBodyHtml() {
      return `<div class="flex flex-col gap-2 min-h-0">
          <div class="flex items-center justify-between">
            <div class="font-semibold">Import workouts</div>
            <button data-action="close-import" class="un-touch-target text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-300 px-2">✕</button>
          </div>
          <p class="text-xs text-zinc-500 dark:text-zinc-400">Paste JSON (a Gym Tracker export, or your conversion script's output in the same format), or choose a .json file. Workouts whose start time already exists are skipped, so re-importing is safe.</p>
          <div class="flex items-center gap-2 text-xs text-zinc-500 dark:text-zinc-400">
            <span>Converting from another app? Give an AI your data plus</span>
            <button data-action="copy-format-spec" class="shrink-0 px-2 py-1 rounded-lg border ${importSheet.specCopied ? 'border-emerald-500 text-emerald-600 dark:text-emerald-400' : 'border-zinc-300 dark:border-zinc-600 text-zinc-600 dark:text-zinc-300 hover:border-zinc-400 dark:hover:border-zinc-500'} font-medium">${importSheet.specCopied ? 'Copied ✓' : 'Copy format spec'}</button>
          </div>
          <input type="file" id="import-file" accept=".json,application/json" class="text-xs text-zinc-500 dark:text-zinc-400">
          <textarea id="import-text" rows="8" spellcheck="false" placeholder='{ "sessions": [ { "started_at": "2024-05-03T18:30:00Z", "exercises": [ … ] } ] }' class="${inp} w-full font-mono text-xs" style="min-height:8rem"></textarea>
          ${importSheet.error ? `<div class="text-red-600 dark:text-red-400 text-xs">${esc(importSheet.error)}</div>` : ''}
          <button data-action="run-import" ${importSheet.busy ? 'disabled' : ''} class="w-full py-2.5 rounded-lg bg-violet-600 hover:bg-violet-500 disabled:opacity-60 text-white text-sm font-medium">${importSheet.busy ? 'Importing…' : 'Import'}</button>
        </div>`;
    }
    function importSheetHtml() {
      return legacySheetWrap('close-import', importSheetBodyHtml(), { cls: 'flex flex-col' });
    }

    function exportSheetBodyHtml() {
      return `<div class="flex flex-col gap-2 min-h-0">
          <div class="flex items-center justify-between">
            <div class="font-semibold">Export workouts</div>
            <button data-action="close-export" class="un-touch-target text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-300 px-2">✕</button>
          </div>
          <p class="text-xs text-zinc-500 dark:text-zinc-400">${exportSheet.count} workout${exportSheet.count === 1 ? '' : 's'} · ${esc(exportSheet.filename)}</p>
          <textarea readonly rows="6" spellcheck="false" class="${inp} w-full font-mono text-xs" style="min-height:6rem">${esc(exportSheet.text)}</textarea>
          <button data-action="download-export" class="w-full py-2.5 rounded-lg bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium">Download .json</button>
          <button data-action="copy-export" class="w-full py-2.5 rounded-lg border ${exportSheet.copied ? 'border-emerald-500 text-emerald-600 dark:text-emerald-400' : 'border-zinc-300 dark:border-zinc-600 text-zinc-700 dark:text-zinc-200 hover:border-zinc-400 dark:hover:border-zinc-500'} text-sm font-medium">${exportSheet.copied ? 'Copied ✓' : 'Copy JSON'}</button>
          <p class="text-xs text-zinc-500 dark:text-zinc-400">If the download doesn’t start (some in-app browsers block it), use Copy JSON and paste into a file or note.</p>
        </div>`;
    }
    function exportSheetHtml() {
      return legacySheetWrap('close-export', exportSheetBodyHtml(), { maxH: '85vh', cls: 'flex flex-col' });
    }

    function pickerBodyHtml() {
      return `<div class="flex flex-col min-h-0">
          <div class="flex items-center justify-between mb-2">
            <div class="font-semibold">Add exercise</div>
            <button data-action="close-picker" class="un-touch-target text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-300 px-2">✕</button>
          </div>
          <input id="picker-search" placeholder="Search or type a new exercise…" autocomplete="off" class="${inp} w-full mb-2">
          <div id="picker-list" class="overflow-y-auto space-y-0.5" style="min-height:8rem"></div>
        </div>`;
    }
    function pickerHtml() {
      return legacySheetWrap('close-picker', pickerBodyHtml(), { maxH: '75dvh', cls: 'flex flex-col' });
    }

    function sessionHtml() {
      const visibleEntries = session.entries.filter((en) => !isPendingDelete('entry', en.id));
      const cards = visibleEntries.length
        ? visibleEntries.map(entryHtml).join('')
        : '<div class="text-center text-zinc-500 dark:text-zinc-600 py-10">No exercises yet — add one below.</div>';
      const sNote = editingSessionNote
        ? `<input id="session-note-input" value="${esc(session.note || '')}" placeholder="Add a workout note…" maxlength="500" autocomplete="off" class="${inp} w-full mb-3">`
        : session.note
          ? `<button data-action="session-note" class="block w-full text-left mb-3 text-sm italic text-amber-700 dark:text-amber-200/80">${esc(session.note)}</button>`
          : `<button data-action="session-note" class="block mb-3 -mt-1 text-xs text-zinc-500 hover:text-zinc-700 dark:text-zinc-600 dark:hover:text-zinc-400">＋ note</button>`;
      return `
        ${headerHtml({ title: fmtDate(session.started_at), subtitle: 'Workout session', backAction: 'back-home', right: unitSwitcherHtml() })}
        ${sNote}
        <div class="space-y-3">${cards}</div>
        <button data-action="open-picker" class="w-full py-3 rounded-xl border border-dashed border-zinc-300 dark:border-zinc-700 text-violet-600 dark:text-violet-400 hover:border-violet-500 hover:text-violet-700 dark:hover:text-violet-300 mt-4 mb-4">+ Add exercise</button>
        ${!hasKit() && picker ? pickerHtml() : ''}
        <button data-action="reset-stopwatch" title="Tap to reset" class="fixed kb-bottom-4 left-1/2 -translate-x-1/2 flex items-center gap-2 rounded-full bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 px-5 py-2 shadow-lg z-10">
          <span class="text-[10px] uppercase tracking-widest text-zinc-500">Rest</span>
          <span id="stopwatch" class="font-mono text-lg tabular-nums">—:—</span>
        </button>`;
    }

    // Small "reps"/"time" chip shown wherever an exercise's fixed type helps
    // (picker rows, chart header). data-ex-type doubles as the test hook.
    function typeBadgeHtml(t) {
      const v = t === 'time' ? 'time' : 'reps';
      return `<span data-ex-type="${v}" class="shrink-0 px-1.5 py-0.5 rounded-full bg-zinc-200/70 dark:bg-zinc-800 text-[10px] text-zinc-500 dark:text-zinc-400">${v}</span>`;
    }

    // Same normalization as the server's exercise-catalog.js: lowercase,
    // punctuation collapsed to spaces, so "t bar row" matches "T-Bar Row".
    function normName(s) {
      return String(s || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
    }

    // Catalog entries matching the query by canonical name OR alias, prefix
    // matches first. Entries whose canonical name the user already has are
    // dropped — that exercise shows in their own list instead.
    function catalogMatches(nq) {
      if (!nq || !exCatalog) return [];
      const have = new Set(picker.list.map((x) => normName(x.name)));
      const out = [];
      for (const e of exCatalog) {
        const cn = normName(e.name);
        if (have.has(cn)) continue;
        let rank = null;
        let via = null;
        if (cn.startsWith(nq)) rank = 0;
        else if (cn.includes(nq)) rank = 1;
        else {
          for (const a of e.aliases || []) {
            const an = normName(a);
            if (an.startsWith(nq)) { rank = 2; via = a; break; }
            if (an.includes(nq) && rank === null) { rank = 3; via = a; }
          }
        }
        if (rank !== null) out.push({ e, rank, via });
      }
      out.sort((a, b) => a.rank - b.rank || a.e.name.localeCompare(b.e.name));
      return out.slice(0, 6);
    }

    function renderPickerList() {
      const box = document.getElementById('picker-list');
      if (!box || !picker) return;
      const q = picker.query.trim();
      const ql = q.toLowerCase();
      const items = picker.list.filter((x) => !ql || x.name.toLowerCase().includes(ql));
      const exact = picker.list.some((x) => x.name.toLowerCase() === ql);
      // Standardized catalog suggestions go FIRST: one tap creates the
      // exercise under its canonical name with the catalog's type and muscle
      // tags. Alias hits show what they matched ("aka …").
      const suggested = catalogMatches(normName(q));
      let html = suggested.length
        ? `<div class="px-3 pt-1 pb-0.5 text-[10px] uppercase tracking-widest text-zinc-500 dark:text-zinc-600">Suggested</div>` +
          suggested.map(({ e, via }) => {
            const sub = via ? `aka ${esc(via)}` : esc((e.muscles || []).join(' · '));
            return `<button data-action="pick-suggested" data-name="${esc(e.name)}" data-type="${e.type}" class="w-full flex items-center justify-between gap-2 text-left px-3 py-2 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800">
              <span class="min-w-0"><span class="block truncate">${esc(e.name)}</span>${sub ? `<span class="block truncate text-[11px] text-zinc-500 dark:text-zinc-500">${sub}</span>` : ''}</span>
              ${typeBadgeHtml(e.type)}</button>`;
          }).join('') +
          (items.length ? `<div class="px-3 pt-2 pb-0.5 text-[10px] uppercase tracking-widest text-zinc-500 dark:text-zinc-600">Your exercises</div>` : '')
        : '';
      html += items.map((x) => `<button data-action="pick-exercise" data-id="${x.id}" class="w-full flex items-center justify-between gap-2 text-left px-3 py-2.5 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800"><span class="truncate">${esc(x.name)}</span>${typeBadgeHtml(x.exercise_type)}</button>`).join('');
      if (q && !exact) {
        // Creating is a two-step choice: the type is picked once, here, and
        // can never be changed afterward — so there's no pre-selected default.
        const typeBtn = (t, label) => `<button data-action="create-exercise-typed" data-type="${t}" class="flex-1 py-2 rounded-lg text-sm bg-zinc-200 text-zinc-700 dark:bg-zinc-800 dark:text-zinc-300 hover:bg-violet-600 hover:text-white dark:hover:bg-violet-600">${label}</button>`;
        html += picker.creating === q
          ? `<div class="px-3 py-2.5 rounded-lg bg-zinc-100 dark:bg-zinc-800/40">
               <div class="text-sm mb-0.5">Create “${esc(q)}” as:</div>
               <div class="text-[11px] text-zinc-500 dark:text-zinc-400 mb-2">This choice is permanent for the exercise.</div>
               <div class="flex gap-1.5">${typeBtn('reps', 'Reps × Weight')}${typeBtn('time', 'Time × Effort')}</div>
             </div>`
          : `<button data-action="create-exercise" class="w-full text-left px-3 py-2.5 rounded-lg text-violet-600 dark:text-violet-400 hover:bg-zinc-100 dark:hover:bg-zinc-800">＋ Create “${esc(q)}”</button>`;
      }
      if (!html) html = '<div class="text-center text-zinc-500 dark:text-zinc-600 text-sm py-6">Type a name to create your first exercise</div>';
      box.innerHTML = html;
    }

    // ---------- progress views ----------

    // Active body-map mode: 'strength' (violet level tint) or 'freq'
    // (emerald 28-day training-frequency tint).
    function mapMode() {
      return (progressHub && progressHub.mode) || 'strength';
    }

    // The active mode's { fill, dot, label } for a muscle, or null when the
    // muscle has no rating in that mode (strength: no score / no bodyweight;
    // freq: summary fetch not landed).
    function hubTint(slug) {
      if (mapMode() === 'freq') {
        const f = hubFreq(slug);
        return f ? { fill: FREQ_FILLS[f.state], dot: FREQ_DOTS[f.state], label: f.label } : null;
      }
      const lv = hubLevel(slug);
      return lv ? { fill: LEVEL_FILLS[lv.level], dot: LEVEL_DOTS[lv.level], label: lv.label } : null;
    }

    // One clickable muscle region: shapes inherit the group's fill so hover /
    // theming lives in one class list. <g> works with the delegated click
    // handler (closest()/dataset work on SVG elements). Rated muscles tint by
    // the active mode (strength level or training frequency); the rest keep
    // neutral zinc.
    function bodyRegion(slug, shapes) {
      const t = hubTint(slug);
      const cls = t
        ? `cursor-pointer ${t.fill} hover:opacity-70 transition-opacity`
        : 'cursor-pointer fill-zinc-400 dark:fill-zinc-600 hover:fill-violet-500 dark:hover:fill-violet-500 transition-colors';
      const title = MUSCLE_LABELS[slug] + (t ? ' — ' + t.label : '');
      return `<g data-action="open-muscle-chart" data-muscle="${slug}" class="${cls}"><title>${title}</title>${shapes}</g>`;
    }

    // Schematic front/back figure — neutral filler (head, hands, joints)
    // underneath, tappable muscle regions on top.
    function figureSvg(side) {
      const filler = `<g class="fill-zinc-200 dark:fill-zinc-800" pointer-events="none">

    function progressHtml() {
      return `
        ${headerHtml({ title: '📈 Progress', subtitle: 'Tap a muscle, or pick an exercise', backAction: 'back-home', right: unitSwitcherHtml() })}
        <div id="body-diagram-slot">${bodyDiagramHtml()}</div>
        <div class="mt-5 mb-2 text-sm font-semibold text-zinc-600 dark:text-zinc-300">By exercise</div>
        <input id="progress-search" placeholder="Search exercises…" autocomplete="off" class="${inp} w-full mb-2">
        <div id="progress-list" class="space-y-0.5 pb-6"></div>
        ${!hasKit() && bwEditor ? bwEditorHtml() : ''}`;
    }

    // Late-fill pass for the body diagram (same pattern as renderProgressList):
    // the hub paints instantly, the tint lands when the summary fetch returns.
    function renderBodyDiagram() {
      const slot = document.getElementById('body-diagram-slot');
      if (slot && progressHub) slot.innerHTML = bodyDiagramHtml();
    }

    function bwEditorBodyHtml() {
      return `<div>
          <div class="flex items-center justify-between mb-3">
            <div class="font-semibold">Bodyweight</div>
            <button data-action="close-bw-editor" class="un-touch-target text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-300 px-2">✕</button>
          </div>
          <div class="text-xs text-zinc-500 dark:text-zinc-400 mb-2">Used to rate each muscle's strength level against your lifts. Leave empty to clear.</div>
          <div class="relative">
            <input id="bw-input" type="number" min="0" step="any" inputmode="decimal" placeholder="bodyweight (${weightUnit})" class="${inp} w-full pr-9">
            <span class="absolute right-2.5 top-1/2 -translate-y-1/2 text-xs text-zinc-400 dark:text-zinc-500 pointer-events-none">${weightUnit}</span>
          </div>

    }
    function bwEditorHtml() {
      return legacySheetWrap('close-bw-editor', bwEditorBodyHtml(), { cls: 'overflow-y-auto' });
    }

    function renderProgressList() {
      const box = document.getElementById('progress-list');
      if (!box || !progressHub) return;
      const ql = progressHub.query.trim().toLowerCase();
      const items = progressHub.list.filter((x) => !ql || x.name.toLowerCase().includes(ql));
      box.innerHTML = items.length ? items.map((x) => {
        const tags = (x.muscles && x.muscles.length)
          ? x.muscles.map((m) => `<span class="px-1.5 py-0.5 rounded-full bg-zinc-200/70 dark:bg-zinc-800 text-[10px] text-zinc-600 dark:text-zinc-400">${MUSCLE_LABELS[m] || esc(m)}</span>`).join('')
          : '<span class="text-[10px] italic text-zinc-400 dark:text-zinc-600">untagged</span>';
        return `<button data-action="open-exercise-chart" data-id="${x.id}" class="w-full text-left px-3 py-2.5 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800">
          <div class="text-sm font-medium">${esc(x.name)}</div>
          <div class="flex flex-wrap gap-1 mt-1">${tags}</div>
        </button>`;
      }).join('') : '<div class="text-center text-zinc-500 dark:text-zinc-600 text-sm py-6">No exercises yet</div>';
    }

    // ---------- chart metrics ----------

    function exerciseMetrics(d) {
      const hasReps = d.sessions.some((s) => s.sets.some((x) => x.set_type === 'reps'));
      const hasTime = d.sessions.some((s) => s.sets.some((x) => x.set_type === 'time'));
      return [...(hasReps ? ['maxw', 'vol', 'e1rm'] : []), ...(hasTime ? ['maxdur', 'totaldur'] : [])];
    }

    // One session's value for a metric, in kg / seconds; null when the
    // session has no sets of that metric's shape (the point is omitted).
    function sessionMetricValue(sets, metric) {
      if (metric === 'maxdur' || metric === 'totaldur') {
        const ts = sets.filter((s) => s.set_type === 'time');
        if (!ts.length) return null;
        return metric === 'maxdur'
          ? Math.max(...ts.map((s) => s.duration_seconds || 0))
          : ts.reduce((a, s) => a + (s.duration_seconds || 0), 0);
      }
      const rs = sets.filter((s) => s.set_type === 'reps');
      if (!rs.length) return null;
      if (metric === 'maxw') return Math.max(...rs.map((s) => parseFloat(s.weight) || 0));
      if (metric === 'vol') return rs.reduce((a, s) => a + (s.reps || 0) * (parseFloat(s.weight) || 0), 0);
      // e1rm (Epley) from weighted sets only; all-bodyweight sessions chart as 0
      const ws = rs.filter((s) => (parseFloat(s.weight) || 0) > 0);
      return ws.length ? Math.max(...ws.map((s) => parseFloat(s.weight) * (1 + (s.reps || 0) / 30))) : 0;
    }

    function weekStartMs(t) {
      const d = new Date(t);
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() - ((d.getDay() + 6) % 7)); // back to Monday
      return d.getTime();
    }

    // Continuous Monday-start weekly buckets from the first week with data
    // through the current week, zero-filled so slack weeks stay visible.
    function muscleWeeks(data) {
      if (!data.sessions.length) return [];
      const byWeek = new Map();
      for (const s of data.sessions) {
        const w = weekStartMs(new Date(s.started_at).getTime());
        const b = byWeek.get(w) || { vol: 0, sets: 0 };
        for (const st of s.sets) {
          b.sets++;
          if (st.set_type === 'reps') b.vol += (st.reps || 0) * (parseFloat(st.weight) || 0);
        }
        byWeek.set(w, b);
      }
      const last = weekStartMs(Date.now());
      const out = [];
      const cur = new Date(Math.min(...byWeek.keys()));
      while (cur.getTime() <= last && out.length < 1040) {
        const b = byWeek.get(cur.getTime()) || { vol: 0, sets: 0 };
        out.push({ t: cur.getTime(), vol: b.vol, sets: b.sets });
        cur.setDate(cur.getDate() + 7);
      }
      return out;
    }

    // ---------- muscle strength (Est. 1RM rollup) ----------

    // An exercise's estimate stops counting 12 weeks after its last weighted
    // work — matching the summary endpoint's 84-day window.
    const STRENGTH_EXPIRY_MS = 84 * 24 * 3600 * 1000;

    // Epley from one weighted reps-set — same math as the exercise chart's
    // e1rm metric in sessionMetricValue.
    function setE1rm(reps, weight) {
      const w = parseFloat(weight);
      return w > 0 ? w * (1 + (reps || 0) / 30) : null;
    }

    // Record a (exercise, week) best-set e1RM into exWeeks:
    // Map(exId → { name, weeks: Map(weekMs → e1rm) }).
    function recordE1rm(exWeeks, exId, exName, weekMs, v) {
      let ex = exWeeks.get(exId);
      if (!ex) { ex = { name: exName, weeks: new Map() }; exWeeks.set(exId, ex); }
      if (!(ex.weeks.get(weekMs) >= v)) ex.weeks.set(weekMs, v);
    }

    // Shared rollup core: walk continuous Monday weeks (first data week →
    // current week) carrying each exercise's latest weekly e1RM forward until
    // it expires, and take the max across exercises per week. Weeks where
    // nothing is live are omitted (an est. 1RM of 0 would be wrong, unlike
    // volume). Returns { points, current, perExercise }: `current` is the
    // value at the current week (null when everything expired) and
    // perExercise maps exId → its latest live e1RM in kg.
    function strengthSeries(exWeeks) {
      let first = Infinity;
      for (const ex of exWeeks.values()) for (const t of ex.weeks.keys()) first = Math.min(first, t);
      if (!Number.isFinite(first)) return { points: [], current: null, perExercise: new Map() };
      const last = weekStartMs(Date.now());
      const points = [];
      const latest = new Map(); // exId → { t, v, name } (most recent weekly value)
      const cur = new Date(first);
      let current = null;
      let steps = 0;
      while (cur.getTime() <= last && steps++ < 1040) {
        const t = cur.getTime();
        for (const [id, ex] of exWeeks) {
          const v = ex.weeks.get(t);
          if (v !== undefined) latest.set(id, { t, v, name: ex.name });
        }
        let best = null;
        for (const [id, l] of latest) {
          if (t - l.t > STRENGTH_EXPIRY_MS) continue;
          if (!best || l.v > best.v) best = { t, v: l.v, exId: id, exName: l.name };
        }
        if (best) points.push(best);
        current = best;
        cur.setDate(cur.getDate() + 7);
      }
      const perExercise = new Map();
      for (const [id, l] of latest) {
        if (last - l.t <= STRENGTH_EXPIRY_MS) perExercise.set(id, l.v);
      }
      return { points, current, perExercise };
    }

    // Strength series for the muscle drill-in, from the history payload's
    // raw per-session sets.
    function muscleStrength(data) {
      const exWeeks = new Map();
      for (const s of data.sessions) {
        const t = weekStartMs(new Date(s.started_at).getTime());
        for (const st of s.sets) {
          if (st.set_type !== 'reps') continue;
          const v = setE1rm(st.reps, st.weight);
          if (v !== null) recordE1rm(exWeeks, st.exercise_id, st.exercise_name, t, v);
        }
      }
      return strengthSeries(exWeeks);
    }

    // Per-muscle current scores for the Progress hub, from the summary
    // endpoint's flat weighted-set rows (an exercise tagged with two muscles
    // counts toward both). Returns { slug: { score, exName } }.
    function muscleStrengthSummary(rows) {
      const byMuscle = new Map();
      for (const r of rows) {
        const v = setE1rm(r.reps, r.weight);
        if (v === null) continue;
        const t = weekStartMs(new Date(r.started_at).getTime());
        for (const m of r.muscles || []) {
          let exWeeks = byMuscle.get(m);
          if (!exWeeks) { exWeeks = new Map(); byMuscle.set(m, exWeeks); }
          recordE1rm(exWeeks, r.exercise_id, r.exercise_name, t, v);
        }
      }
      const out = {};
      for (const [m, exWeeks] of byMuscle) {
        const cur = strengthSeries(exWeeks).current;
        if (cur) out[m] = { score: cur.v, exName: cur.exName };
      }
      return out;
    }

    // Per-muscle training frequency over the rolling 28-day window, from the
    // summary endpoint's flat set rows (an exercise tagged with two muscles
    // counts toward both, matching muscleStrengthSummary). Returns
    // { slug: { state, label, setsPerWeek, sessionsPerWeek } }.
    function muscleFrequencySummary(rows) {
      const cutoff = Date.now() - FREQ_WINDOW_MS;
      const byMuscle = new Map(); // slug → { sets, sessions: Set }
      for (const r of rows) {
        if (new Date(r.started_at).getTime() < cutoff) continue;
        for (const m of r.muscles || []) {
          let b = byMuscle.get(m);
          if (!b) { b = { sets: 0, sessions: new Set() }; byMuscle.set(m, b); }
          b.sets++;
          b.sessions.add(r.session_id);
        }
      }
      const out = {};
      for (const m of MUSCLE_SLUGS) {
        const b = byMuscle.get(m);
        const setsPerWeek = b ? b.sets / (FREQ_WINDOW_DAYS / 7) : 0;
        const sessionsPerWeek = b ? b.sessions.size / (FREQ_WINDOW_DAYS / 7) : 0;
        const state = freqState(setsPerWeek);
        out[m] = { state, label: FREQ_LABELS[state], setsPerWeek, sessionsPerWeek };
      }
      return out;
    }

    // Same rollup for the muscle drill-in, from the history payload's
    // per-session sets (every set counts, regardless of shape).
    function muscleFrequency(data) {
      const cutoff = Date.now() - FREQ_WINDOW_MS;
      let sets = 0;
      const sessions = new Set();
      for (const s of data.sessions) {
        if (new Date(s.started_at).getTime() < cutoff) continue;
        sets += s.sets.length;
        if (s.sets.length) sessions.add(s.session_id);
      }
      const setsPerWeek = sets / (FREQ_WINDOW_DAYS / 7);
      const sessionsPerWeek = sessions.size / (FREQ_WINDOW_DAYS / 7);
      const state = freqState(setsPerWeek);
      return { state, label: FREQ_LABELS[state], setsPerWeek, sessionsPerWeek };
    }

    // Level for a muscle on the Progress hub, or null (no score / no bodyweight).
    function hubLevel(slug) {
      const s = progressHub && progressHub.strength && progressHub.strength[slug];
      return s ? strengthLevel(slug, s.score, bodyweightKg) : null;
    }

    // Frequency state for a muscle on the Progress hub, or null (summary
    // fetch not landed / failed — the map stays neutral, like unrated).
    function hubFreq(slug) {
      return (progressHub && progressHub.freq && progressHub.freq[slug]) || null;
    }

    // Axis/gridline label for a metric value (kg → display unit for weights).
    function fmtMetricVal(metric, v) {
      if (metric === 'maxdur' || metric === 'totaldur') return fmtDur(Math.round(v));
      if (metric === 'sets') return String(Math.round(v * 10) / 10);
      const n = weightUnit === 'lbs' ? v * LBS_PER_KG : v;
      return String(Math.round(n * 10) / 10);
    }

    function niceCeil(v) {
      const pow = Math.pow(10, Math.floor(Math.log10(v)));
      for (const m of [1, 1.5, 2, 2.5, 3, 4, 5, 6, 8, 10]) {
        if (m * pow >= v - 1e-9) return m * pow;
      }
      return 10 * pow;
    }

    function metricToggleHtml(metrics, active) {
      return `<div class="flex flex-wrap gap-1.5 mb-2">${metrics.map((m) => `<button data-action="chart-metric" data-metric="${m}" class="px-2.5 py-1 rounded-lg text-xs transition-colors ${active === m ? 'bg-violet-600 text-white' : 'bg-zinc-200 text-zinc-600 dark:bg-zinc-800 dark:text-zinc-400'}">${METRIC_LABELS[m]}</button>`).join('')}</div>`;
    }

    // Hand-rolled SVG line chart: true time scale on X, 0→nice-max on Y.
    // `guide` (optional) draws a dashed horizontal target line at that value
    // and stretches the Y axis so the line is always visible.
    function chartSvgHtml(points, fmtY, guide) {
      if (!points.length) return '<div data-chart class="text-center text-zinc-500 dark:text-zinc-600 text-sm py-8">No data for this metric.</div>';
      const W = 400, H = 200, L = 48, R = 14, T = 14, B = 26;
      const maxV = Math.max(...points.map((p) => p.v));
      const top = niceCeil(Math.max(maxV <= 0 ? 10 : maxV * 1.05, guide ? guide * 1.15 : 0));
      const minT = points[0].t, maxT = points[points.length - 1].t;
      const x = (t) => maxT === minT ? L + (W - L - R) / 2 : L + (t - minT) / (maxT - minT) * (W - L - R);
      const y = (v) => T + (1 - v / top) * (H - T - B);
      let grid = '';
      for (let i = 0; i <= 4; i++) {
        const v = top * i / 4, yy = y(v);
        grid += `<line x1="${L}" x2="${W - R}" y1="${yy}" y2="${yy}" stroke-width="1" class="stroke-zinc-200 dark:stroke-zinc-800"/>` +
          `<text x="${L - 6}" y="${yy + 3.5}" text-anchor="end" font-size="10" class="fill-zinc-400 dark:fill-zinc-500">${esc(fmtY(v))}</text>`;
      }
      const idxs = [...new Set(points.length < 3 ? [0, points.length - 1] : [0, Math.floor((points.length - 1) / 2), points.length - 1])];
      const xlab = idxs.map((i) => `<text x="${x(points[i].t).toFixed(1)}" y="${H - 8}" text-anchor="middle" font-size="10" class="fill-zinc-400 dark:fill-zinc-500">${esc(fmtDateShort(points[i].t))}</text>`).join('');
      const pts = points.map((p) => x(p.t).toFixed(1) + ',' + y(p.v).toFixed(1)).join(' ');
      const guideLine = guide
        ? `<line x1="${L}" x2="${W - R}" y1="${y(guide).toFixed(1)}" y2="${y(guide).toFixed(1)}" stroke="#059669" stroke-width="1.5" stroke-dasharray="5 4"/>` +
          `<text x="${W - R}" y="${(y(guide) - 4).toFixed(1)}" text-anchor="end" font-size="9" fill="#059669">growth target</text>`
        : '';
      const line = points.length > 1 ? `<polyline points="${pts}" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>` : '';
      const dots = points.map((p) => `<circle cx="${x(p.t).toFixed(1)}" cy="${y(p.v).toFixed(1)}" r="3.2" fill="#7c3aed"/>`).join('');
      return `<div data-chart class="rounded-xl bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 p-2"><svg viewBox="0 0 ${W} ${H}" class="w-full">${grid}${guideLine}${line}${dots}${xlab}</svg></div>`;
    }

    function muscleEditorBodyHtml() {
      const chip = (m) => `<button data-action="toggle-muscle" data-muscle="${m}" class="px-3 py-1.5 rounded-full text-sm transition-colors ${muscleEditor.selected.includes(m) ? 'bg-violet-600 text-white' : 'bg-zinc-200 text-zinc-600 dark:bg-zinc-800 dark:text-zinc-400'}">${MUSCLE_LABELS[m]}</button>`;
      return `<div>
          <div class="flex items-center justify-between mb-3">
            <div class="font-semibold">Muscle groups</div>
            <button data-action="close-muscle-editor" class="un-touch-target text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-300 px-2">✕</button>
          </div>
          <div class="flex flex-wrap gap-1.5">${MUSCLE_SLUGS.map(chip).join('')}</div>
          <button data-action="save-muscles" class="w-full mt-4 py-2.5 rounded-lg bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium">Save</button>
        </div>`;
    }
    function muscleEditorHtml() {
      return legacySheetWrap('close-muscle-editor', muscleEditorBodyHtml(), { cls: 'overflow-y-auto' });
    }

    function exerciseChartHtml() {
      const d = exerciseView.data;
      const metric = exerciseView.metric;
      const metrics = exerciseMetrics(d);
      const tagChips = (d.muscles || []).length
        ? d.muscles.map((m) => `<span class="px-2 py-0.5 rounded-full bg-violet-600/10 text-violet-700 dark:text-violet-300 text-xs">${MUSCLE_LABELS[m] || esc(m)}</span>`).join('')
        : '<span class="text-xs italic text-zinc-400 dark:text-zinc-600">no muscle tags</span>';
      const editBtn = demo ? '' : '<button data-action="edit-muscles" class="text-xs text-violet-600 dark:text-violet-400 hover:text-violet-700 dark:hover:text-violet-300 px-1 shrink-0">Edit tags</button>';
      // Hide a history row (and its chart point) while its delete sits in
      // the undo window, mirroring the home / session lists.
      const visibleSessions = d.sessions.filter((s) => !isPendingDelete('hist', s.session_id));
      let body;
      if (!d.sessions.length) {
        body = '<div class="text-center text-zinc-500 dark:text-zinc-600 py-12">No sets logged yet — its history will appear here.</div>';
      } else {
        const points = visibleSessions
          .map((s) => ({ t: new Date(s.started_at).getTime(), v: sessionMetricValue(s.sets, metric) }))
          .filter((p) => p.v !== null);
        const wm = metric === 'maxw' || metric === 'vol' || metric === 'e1rm';
        const histRowCls = hasKit()
          ? 'un-group-row relative flex items-stretch overflow-hidden'
          : 'relative flex items-stretch rounded-lg bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 overflow-hidden';
        const hist = [...visibleSessions].reverse().map((s) => `
            <div data-swipe="hist:${s.session_id}" class="${histRowCls}">
              <button data-action="open-session" data-id="${s.session_id}" class="flex-1 text-left px-3 py-2 hover:bg-zinc-100 dark:hover:bg-zinc-800/60 min-w-0">
                <div class="text-sm font-medium">${fmtDateShort(s.started_at)}</div>
                <div class="text-xs font-mono text-zinc-500 truncate mt-0.5">${esc(fmtSetList(s.sets))}</div>
              </button>
              <button data-action="delete-history-entry" data-session="${s.session_id}" class="x-delete un-touch-target px-3 text-zinc-400 dark:text-zinc-600 hover:text-red-500 dark:hover:text-red-400" title="Delete this exercise from that workout">✕</button>
            </div>`).join('');
        body = `
          ${metrics.length > 1 ? metricToggleHtml(metrics, metric) : ''}
          <div class="text-[10px] uppercase tracking-widest text-zinc-400 dark:text-zinc-600 mb-1">${METRIC_LABELS[metric]}${wm ? ' · ' + weightUnit : ''}</div>
          ${chartSvgHtml(points, (v) => fmtMetricVal(metric, v))}
          <div class="mt-4 mb-2 text-sm font-semibold text-zinc-600 dark:text-zinc-300">History</div>
          ${hasKit() ? `<div class="un-group mb-6">${hist}</div>` : `<div class="space-y-1.5 pb-6">${hist}</div>`}`;
      }
      // Whole-exercise delete: too destructive for the 5s undo window, so it
      // uses an inline two-step confirm instead (blocking confirm() dialogs
      // are suppressed in the platform iframe).
      const delBlock = exerciseView.confirmDelete
        ? `<div class="mt-2 mb-8 rounded-xl border border-red-300 dark:border-red-900 bg-red-50 dark:bg-red-950/40 p-3">
            <div class="text-sm text-red-700 dark:text-red-300">Delete “${esc(d.name)}” and its entire history${visibleSessions.length ? ` (${visibleSessions.length} workout${visibleSessions.length === 1 ? '' : 's'})` : ''}? This can’t be undone.</div>
            <div class="flex gap-2 mt-2.5">
              <button data-action="delete-exercise-confirm" ${exerciseView.deleting ? 'disabled' : ''} class="flex-1 py-2 rounded-lg bg-red-600 hover:bg-red-500 disabled:opacity-60 text-white text-sm font-medium">${exerciseView.deleting ? 'Deleting…' : 'Delete everything'}</button>
              <button data-action="delete-exercise-cancel" class="px-4 py-2 rounded-lg bg-zinc-200 dark:bg-zinc-700/60 text-sm">Cancel</button>
            </div>
          </div>`
        : `<div class="mt-2 mb-8 text-center">
            <button data-action="delete-exercise" class="text-xs text-zinc-500 hover:text-red-600 dark:text-zinc-600 dark:hover:text-red-400 px-2 py-1">🗑 Delete exercise…</button>
          </div>`;
      return `
        ${headerHtml({ title: esc(d.name), subtitle: `${visibleSessions.length} workout${visibleSessions.length === 1 ? '' : 's'}`, backAction: 'chart-back', right: unitSwitcherHtml() })}
        <div class="flex items-center gap-1.5 flex-wrap mb-3">${typeBadgeHtml(d.exercise_type)}${tagChips}${editBtn}</div>
        ${body}
        ${delBlock}
        ${!hasKit() && muscleEditor ? muscleEditorHtml() : ''}`;
    }

    function muscleChartHtml() {
      const mv = muscleView;
      const label = MUSCLE_LABELS[mv.muscle] || esc(mv.muscle);
      let body;
      if (!mv.data.exercises.length) {
        body = `<div class="text-center text-zinc-500 dark:text-zinc-600 py-12 px-4">No exercises are tagged with ${label} yet.<br><span class="text-sm">Open an exercise from the Progress screen and use “Edit tags”.</span></div>`;
      } else if (!mv.data.sessions.length) {
        body = `<div class="text-center text-zinc-500 dark:text-zinc-600 py-12">No sets logged yet for ${label}-tagged exercises.</div>`;
      } else {
        const weeks = muscleWeeks(mv.data);
        const strength = muscleStrength(mv.data);
        const hasWeighted = mv.data.sessions.some((s) => s.sets.some((st) => st.set_type === 'reps' && parseFloat(st.weight) > 0));
        const metrics = hasWeighted ? ['e1rm', 'vol', 'sets'] : ['vol', 'sets'];
        const points = mv.metric === 'e1rm'
          ? strength.points.map((p) => ({ t: p.t, v: p.v }))
          : weeks.map((w) => ({ t: w.t, v: mv.metric === 'vol' ? w.vol : w.sets }));
        let headline = '';
        if (mv.metric === 'e1rm' && strength.current) {
          const lv = strengthLevel(mv.muscle, strength.current.v, bodyweightKg);
          headline = `<div class="mb-2 text-sm text-zinc-600 dark:text-zinc-300">
            <span class="font-semibold">Est. 1RM: ${fmtMetricVal('e1rm', strength.current.v)} ${weightUnit}</span>
            ${lv ? `<span class="ml-1 px-2 py-0.5 rounded-full bg-violet-600/10 text-violet-700 dark:text-violet-300 text-xs">${lv.label}</span>` : ''}
            <span class="text-xs text-zinc-500">· via</span>
            <button data-action="open-exercise-chart" data-id="${strength.current.exId}" class="text-xs text-violet-600 dark:text-violet-400 hover:text-violet-700 dark:hover:text-violet-300 underline decoration-dotted underline-offset-2">${esc(strength.current.exName)}</button>
          </div>`;
        }
        const counts = new Map();
        for (const s of mv.data.sessions) for (const st of s.sets) {
          counts.set(st.exercise_id, (counts.get(st.exercise_id) || 0) + 1);
        }
        const exRows = mv.data.exercises.map((x) => {
          const n = counts.get(x.id) || 0;
          const e1 = strength.perExercise.get(x.id);
          return `<button data-action="open-exercise-chart" data-id="${x.id}" class="w-full flex items-baseline justify-between gap-2 text-left px-3 py-2 rounded-lg bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 hover:bg-zinc-100 dark:hover:bg-zinc-800/60">
            <span class="text-sm font-medium truncate">${esc(x.name)}</span>
            <span class="text-xs text-zinc-500 shrink-0">${n} set${n === 1 ? '' : 's'}${e1 ? ' · ' + fmtMetricVal('e1rm', e1) + ' ' + weightUnit + ' e1RM' : ''}</span>
          </button>`;
        }).join('');
        // Training-frequency ("growth") status — shown for every metric,
        // alongside (never replacing) the strength headline below it.
        const fq = muscleFrequency(mv.data);
        const fmt1 = (v) => String(Math.round(v * 10) / 10);
        const freqLine = `<div class="mb-2 text-sm text-zinc-600 dark:text-zinc-300">
          <span class="px-2 py-0.5 rounded-full text-xs font-medium ${FREQ_BADGES[fq.state]}">${fq.label}</span>
          <span class="text-xs text-zinc-500 ml-1">${fmt1(fq.setsPerWeek)} sets/wk · ${fmt1(fq.sessionsPerWeek)} workouts/wk over the last 4 weeks</span>
        </div>`;
        body = `
          ${freqLine}
          ${metricToggleHtml(metrics, mv.metric)}
          ${headline}
          <div class="text-[10px] uppercase tracking-widest text-zinc-400 dark:text-zinc-600 mb-1">${mv.metric === 'e1rm' ? 'Est. 1RM · ' + weightUnit : 'Weekly ' + (mv.metric === 'vol' ? 'volume · ' + weightUnit : 'sets')}</div>
          ${chartSvgHtml(points, (v) => fmtMetricVal(mv.metric, v), mv.metric === 'sets' ? FREQ_THRESHOLDS[1] : 0)}
          <div class="mt-4 mb-2 text-sm font-semibold text-zinc-600 dark:text-zinc-300">Exercises</div>
          <div class="space-y-1.5 pb-6">${exRows}</div>`;
      }
      return `
        ${headerHtml({ title: label, subtitle: 'Weekly training across tagged exercises', backAction: 'chart-back', right: unitSwitcherHtml() })}
        ${body}`;
    }

    async function openProgress() {
      // Default map mode: strength when a bodyweight is set, frequency when
      // it isn't (strength tinting is hidden anyway without one).
      progressHub = { query: '', list: [], strength: null, freq: null, mode: bodyweightKg ? 'strength' : 'freq' };
      exerciseView = null; muscleView = null; muscleEditor = null; bwEditor = null;
      openForm = null; picker = null; importSheet = null; exportSheet = null;
      view = 'progress';
      render();
      // Summary failures only cost the tint — never block the hub.
      const [listRes, sumRes] = await Promise.all([
        api('GET', '/api/exercises'),
        api('GET', '/api/muscles/summary').catch(() => null),
      ]);
      if (progressHub) {
        progressHub.list = listRes.exercises;
        if (sumRes) {
          progressHub.strength = muscleStrengthSummary(sumRes.sets);
          progressHub.freq = muscleFrequencySummary(sumRes.sets);
        }
        renderProgressList();
        renderBodyDiagram();
      }
    }

    async function openExerciseChart(id, from) {
      const data = await api('GET', '/api/exercises/' + id + '/history');
      const metrics = exerciseMetrics(data);
      exerciseView = { data, metric: metrics[0] || 'maxw', from: from || 'progress' };
      muscleView = null; muscleEditor = null; bwEditor = null;
      view = 'exercise';
      render();
    }

    async function openMuscleChart(slug) {
      const data = await api('GET', '/api/muscles/' + slug + '/history');
      const weeks = muscleWeeks(data);
      // Est. 1RM is the default whenever weighted work exists; a muscle
      // trained only with timed/bodyweight work (all-zero volume) falls back
      // to Volume → Sets as before.
      const hasWeighted = data.sessions.some((s) => s.sets.some((st) => st.set_type === 'reps' && parseFloat(st.weight) > 0));
      muscleView = { muscle: slug, data, metric: hasWeighted ? 'e1rm' : (weeks.some((w) => w.vol > 0) ? 'vol' : 'sets') };
      exerciseView = null; muscleEditor = null; bwEditor = null;
      view = 'muscle';
      render();
    }

    // Carry focus, caret, and in-progress text across the full innerHTML
    // swap, so a background re-render (e.g. the undo window committing while
    // the user is typing) doesn't slam the mobile keyboard shut.
    function captureFocus() {
      const el = document.activeElement;
      if (!el || (el.tagName !== 'INPUT' && el.tagName !== 'TEXTAREA') || el.type === 'file' || !el.closest('#app, [data-un-sheet-host]')) return null;
      const name = el.closest('#set-form') ? el.name : null;
      if (!el.id && !name) return null;
      let start = null, end = null;
      try { start = el.selectionStart; end = el.selectionEnd; } catch (_) {}
      return { id: el.id || null, name, value: el.value, start, end };
    }
    function restoreFocus(f) {
      if (!f) return;
      const el = f.id ? document.getElementById(f.id) : document.querySelector('#set-form [name="' + f.name + '"]');
      if (!el) return;
      // If wireInputs just focused a different edit surface, it wins.
      const active = document.activeElement;
      if (active && active !== el && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) return;
      if (el.value !== f.value) el.value = f.value;
      if (active !== el) el.focus({ preventScroll: true });
      if (f.start !== null && el.setSelectionRange) { try { el.setSelectionRange(f.start, f.end); } catch (_) {} }
    }

    function render() {
      // A view-changing action sets pendingNav ('push'/'pop'); everything
      // else re-renders instantly — per the kit's fidelity rules, no
      // animation on high-frequency updates (toggles, typing, undo commits).
      const nav = pendingNav;
      pendingNav = null;
      const apply = () => {
        const html = view === 'home' ? homeHtml()
          : view === 'session' ? sessionHtml()
          : view === 'progress' ? progressHtml()
          : view === 'exercise' ? exerciseChartHtml()
          : muscleChartHtml();
        const focused = captureFocus();
        document.getElementById('app').innerHTML = html;
        syncSheets();
        wireInputs();
        restoreFocus(focused);
        wireNative();
        tick();
      };
      if (hasKit() && nav) unNative.transition(apply, { type: nav });
      else apply();
    }

    // ---------- usernode-native wiring ----------

    // Kit-presented bottom sheets, keyed by kind. syncSheets() reconciles
    // them with the app's sheet state on every render: present when state
    // opens, refresh content in place while open (focus/caret survive via
    // captureFocus/restoreFocus), dismiss when state clears. A user
    // drag/backdrop dismissal calls back through onDismiss to clear state.
    const kitSheets = {};
    function syncKitSheet(kind, open, bodyHtml, onClosed) {
      const cur = kitSheets[kind];
      if (open && !cur) {
        const el = document.createElement('div');
        el.dataset.unSheetHost = kind;
        el.className = 'w-full max-w-md mx-auto';
        // The kit lifts the sheet above the on-screen keyboard itself
        // (--un-kb-inset); cap content height to what remains visible.
        el.style.maxHeight = 'calc(85dvh - var(--un-kb-inset, 0px))';
        el.style.overflowY = 'auto';
        el.style.touchAction = 'pan-y';
        el.innerHTML = bodyHtml();
        const handle = unNative.presentSheet({
          contentEl: el,
          onDismiss: () => {
            if (kitSheets[kind] && kitSheets[kind].el === el) {
              delete kitSheets[kind];
              onClosed();
            }
          },
        });
        kitSheets[kind] = { handle, el };
      } else if (open && cur) {
        cur.el.innerHTML = bodyHtml();
      } else if (!open && cur) {
        delete kitSheets[kind]; // before dismiss() so onDismiss no-ops
        cur.handle.dismiss();
      }
    }

    function syncSheets() {
      if (!hasKit()) return; // legacy sheets render inline in the view html
      syncKitSheet('picker', !!picker && view === 'session', pickerBodyHtml, () => { picker = null; });
      syncKitSheet('import', !!importSheet && view === 'home', importSheetBodyHtml, () => { importSheet = null; });
      syncKitSheet('export', !!exportSheet && view === 'home', exportSheetBodyHtml, () => { exportSheet = null; });
      syncKitSheet('muscle-editor', !!muscleEditor && view === 'exercise', muscleEditorBodyHtml, () => { muscleEditor = null; });
      syncKitSheet('bw', !!bwEditor && view === 'progress', bwEditorBodyHtml, () => { bwEditor = null; });
    }

    // Re-attach kit behaviors after every innerHTML swap. Old handles are
    // detached first (their nodes are gone, but detach also unhooks the
    // window-level listeners attachNavBar installs).
    let kitDetach = [];
    function wireNative() {

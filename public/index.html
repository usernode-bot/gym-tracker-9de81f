    // ---------- chart metrics ----------

    function exerciseMetrics(d) {
      const hasReps = d.sessions.some((s) => s.sets.some((x) => x.set_type === 'reps'));
      const hasTime = d.sessions.some((s) => s.sets.some((x) => x.set_type === 'time'));
      return [...(hasReps ? ['maxw', 'vol', 'e1rm'] : []), ...(hasTime ? ['maxdur', 'totaldur'] : [])];
    }

    // One session's value for a metric, in kg / seconds; null when the
    // session has no sets of that metric's shape (the point is omitted).
    function sessionMetricValue(sets, metric) {
      if (metric === 'maxdur' || metric === 'totaldur') {
        const ts = sets.filter((s) => s.set_type === 'time');
        if (!ts.length) return null;
        return metric === 'maxdur'
          ? Math.max(...ts.map((s) => s.duration_seconds || 0))
          : ts.reduce((a, s) => a + (s.duration_seconds || 0), 0);
      }
      const rs = sets.filter((s) => s.set_type === 'reps');
      if (!rs.length) return null;
      if (metric === 'maxw') return Math.max(...rs.map((s) => parseFloat(s.weight) || 0));
      if (metric === 'vol') return rs.reduce((a, s) => a + (s.reps || 0) * (parseFloat(s.weight) || 0), 0);
      // e1rm (Epley) from weighted sets only; all-bodyweight sessions chart as 0
      const ws = rs.filter((s) => (parseFloat(s.weight) || 0) > 0);
      return ws.length ? Math.max(...ws.map((s) => parseFloat(s.weight) * (1 + (s.reps || 0) / 30))) : 0;
    }

    function weekStartMs(t) {
      const d = new Date(t);
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() - ((d.getDay() + 6) % 7)); // back to Monday
      return d.getTime();
    }

    // Continuous Monday-start weekly buckets from the first week with data
    // through the current week, zero-filled so slack weeks stay visible.
    function muscleWeeks(data) {
      if (!data.sessions.length) return [];
      const byWeek = new Map();
      for (const s of data.sessions) {
        const w = weekStartMs(new Date(s.started_at).getTime());
        const b = byWeek.get(w) || { vol: 0, sets: 0 };
        for (const st of s.sets) {
          b.sets++;
          if (st.set_type === 'reps') b.vol += (st.reps || 0) * (parseFloat(st.weight) || 0);
        }
        byWeek.set(w, b);
      }
      const last = weekStartMs(Date.now());
      const out = [];
      const cur = new Date(Math.min(...byWeek.keys()));
      while (cur.getTime() <= last && out.length < 1040) {
        const b = byWeek.get(cur.getTime()) || { vol: 0, sets: 0 };
        out.push({ t: cur.getTime(), vol: b.vol, sets: b.sets });
        cur.setDate(cur.getDate() + 7);
      }
      return out;
    }

    // ---------- muscle strength (Est. 1RM rollup) ----------

    // An exercise's estimate stops counting 12 weeks after its last weighted
    // work — matching the summary endpoint's 84-day window.
    const STRENGTH_EXPIRY_MS = 84 * 24 * 3600 * 1000;

    // Epley from one weighted reps-set — same math as the exercise chart's
    // e1rm metric in sessionMetricValue.
    function setE1rm(reps, weight) {
      const w = parseFloat(weight);
      return w > 0 ? w * (1 + (reps || 0) / 30) : null;
    }

    // Record a (exercise, week) best-set e1RM into exWeeks:
    // Map(exId → { name, weeks: Map(weekMs → e1rm) }).
    function recordE1rm(exWeeks, exId, exName, weekMs, v) {
      let ex = exWeeks.get(exId);
      if (!ex) { ex = { name: exName, weeks: new Map() }; exWeeks.set(exId, ex); }
      if (!(ex.weeks.get(weekMs) >= v)) ex.weeks.set(weekMs, v);
    }

    // Shared rollup core: walk continuous Monday weeks (first data week →
    // current week) carrying each exercise's latest weekly e1RM forward until
    // it expires, and take the max across exercises per week. Weeks where
    // nothing is live are omitted (an est. 1RM of 0 would be wrong, unlike
    // volume). Returns { points, current, perExercise }: `current` is the
    // value at the current week (null when everything expired) and
    // perExercise maps exId → its latest live e1RM in kg.
    function strengthSeries(exWeeks) {
      let first = Infinity;
      for (const ex of exWeeks.values()) for (const t of ex.weeks.keys()) first = Math.min(first, t);
      if (!Number.isFinite(first)) return { points: [], current: null, perExercise: new Map() };
      const last = weekStartMs(Date.now());
      const points = [];
      const latest = new Map(); // exId → { t, v, name } (most recent weekly value)
      const cur = new Date(first);
      let current = null;
      let steps = 0;
      while (cur.getTime() <= last && steps++ < 1040) {
        const t = cur.getTime();
        for (const [id, ex] of exWeeks) {
          const v = ex.weeks.get(t);
          if (v !== undefined) latest.set(id, { t, v, name: ex.name });
        }
        let best = null;
        for (const [id, l] of latest) {
          if (t - l.t > STRENGTH_EXPIRY_MS) continue;
          if (!best || l.v > best.v) best = { t, v: l.v, exId: id, exName: l.name };
        }
        if (best) points.push(best);
        current = best;
        cur.setDate(cur.getDate() + 7);
      }
      const perExercise = new Map();
      for (const [id, l] of latest) {
        if (last - l.t <= STRENGTH_EXPIRY_MS) perExercise.set(id, l.v);
      }
      return { points, current, perExercise };
    }

    // Strength series for the muscle drill-in, from the history payload's
    // raw per-session sets.
    function muscleStrength(data) {
      const exWeeks = new Map();
      for (const s of data.sessions) {
        const t = weekStartMs(new Date(s.started_at).getTime());
        for (const st of s.sets) {
          if (st.set_type !== 'reps') continue;
          const v = setE1rm(st.reps, st.weight);
          if (v !== null) recordE1rm(exWeeks, st.exercise_id, st.exercise_name, t, v);
        }
      }
      return strengthSeries(exWeeks);
    }

    // Per-muscle current scores for the Progress hub, from the summary
    // endpoint's flat weighted-set rows (an exercise tagged with two muscles
    // counts toward both). Returns { slug: { score, exName } }.
    function muscleStrengthSummary(rows) {
      const byMuscle = new Map();
      for (const r of rows) {
        const v = setE1rm(r.reps, r.weight);
        if (v === null) continue;
        const t = weekStartMs(new Date(r.started_at).getTime());
        for (const m of r.muscles || []) {
          let exWeeks = byMuscle.get(m);
          if (!exWeeks) { exWeeks = new Map(); byMuscle.set(m, exWeeks); }
          recordE1rm(exWeeks, r.exercise_id, r.exercise_name, t, v);
        }
      }
      const out = {};
      for (const [m, exWeeks] of byMuscle) {
        const cur = strengthSeries(exWeeks).current;
        if (cur) out[m] = { score: cur.v, exName: cur.exName };
      }
      return out;
    }

    // Level for a muscle on the Progress hub, or null (no score / no bodyweight).
    function hubLevel(slug) {
      const s = progressHub && progressHub.strength && progressHub.strength[slug];
      return s ? strengthLevel(slug, s.score, bodyweightKg) : null;
    }

    // Axis/gridline label for a metric value (kg → display unit for weights).
    function fmtMetricVal(metric, v) {
      if (metric === 'maxdur' || metric === 'totaldur') return fmtDur(Math.round(v));
      if (metric === 'sets') return String(Math.round(v * 10) / 10);
      const n = weightUnit === 'lbs' ? v * LBS_PER_KG : v;
      return String(Math.round(n * 10) / 10);
    }

    function niceCeil(v) {
      const pow = Math.pow(10, Math.floor(Math.log10(v)));
      for (const m of [1, 1.5, 2, 2.5, 3, 4, 5, 6, 8, 10]) {
        if (m * pow >= v - 1e-9) return m * pow;
      }
      return 10 * pow;
    }

    function metricToggleHtml(metrics, active) {
      return `<div class="flex flex-wrap gap-1.5 mb-2">${metrics.map((m) => `<button data-action="chart-metric" data-metric="${m}" class="px-2.5 py-1 rounded-lg text-xs transition-colors ${active === m ? 'bg-violet-600 text-white' : 'bg-zinc-200 text-zinc-600 dark:bg-zinc-800 dark:text-zinc-400'}">${METRIC_LABELS[m]}</button>`).join('')}</div>`;
    }

    // Hand-rolled SVG line chart: true time scale on X, 0→nice-max on Y.
    function chartSvgHtml(points, fmtY) {
      if (!points.length) return '<div data-chart class="text-center text-zinc-500 dark:text-zinc-600 text-sm py-8">No data for this metric.</div>';
      const W = 400, H = 200, L = 48, R = 14, T = 14, B = 26;
      const maxV = Math.max(...points.map((p) => p.v));
      const top = niceCeil(maxV <= 0 ? 10 : maxV * 1.05);
      const minT = points[0].t, maxT = points[points.length - 1].t;
      const x = (t) => maxT === minT ? L + (W - L - R) / 2 : L + (t - minT) / (maxT - minT) * (W - L - R);
      const y = (v) => T + (1 - v / top) * (H - T - B);
      let grid = '';
      for (let i = 0; i <= 4; i++) {
        const v = top * i / 4, yy = y(v);
        grid += `<line x1="${L}" x2="${W - R}" y1="${yy}" y2="${yy}" stroke-width="1" class="stroke-zinc-200 dark:stroke-zinc-800"/>` +
          `<text x="${L - 6}" y="${yy + 3.5}" text-anchor="end" font-size="10" class="fill-zinc-400 dark:fill-zinc-500">${esc(fmtY(v))}</text>`;
      }
      const idxs = [...new Set(points.length < 3 ? [0, points.length - 1] : [0, Math.floor((points.length - 1) / 2), points.length - 1])];
      const xlab = idxs.map((i) => `<text x="${x(points[i].t).toFixed(1)}" y="${H - 8}" text-anchor="middle" font-size="10" class="fill-zinc-400 dark:fill-zinc-500">${esc(fmtDateShort(points[i].t))}</text>`).join('');
      const pts = points.map((p) => x(p.t).toFixed(1) + ',' + y(p.v).toFixed(1)).join(' ');
      const line = points.length > 1 ? `<polyline points="${pts}" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>` : '';
      const dots = points.map((p) => `<circle cx="${x(p.t).toFixed(1)}" cy="${y(p.v).toFixed(1)}" r="3.2" fill="#7c3aed"/>`).join('');
      return `<div data-chart class="rounded-xl bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 p-2"><svg viewBox="0 0 ${W} ${H}" class="w-full">${grid}${line}${dots}${xlab}</svg></div>`;
    }

    function muscleEditorHtml() {
      const chip = (m) => `<button data-action="toggle-muscle" data-muscle="${m}" class="px-3 py-1.5 rounded-full text-sm transition-colors ${muscleEditor.selected.includes(m) ? 'bg-violet-600 text-white' : 'bg-zinc-200 text-zinc-600 dark:bg-zinc-800 dark:text-zinc-400'}">${MUSCLE_LABELS[m]}</button>`;
      return `<div data-action="close-muscle-editor" class="fixed inset-0 bg-black/60 z-20">
        <div class="absolute inset-x-0 bottom-0 mx-auto w-full max-w-md bg-white dark:bg-zinc-900 border-t border-zinc-200 dark:border-zinc-700 rounded-t-2xl p-4">
          <div class="flex items-center justify-between mb-3">
            <div class="font-semibold">Muscle groups</div>
            <button data-action="close-muscle-editor" class="text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-300 px-2">✕</button>
          </div>
          <div class="flex flex-wrap gap-1.5">${MUSCLE_SLUGS.map(chip).join('')}</div>
          <button data-action="save-muscles" class="w-full mt-4 py-2.5 rounded-lg bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium">Save</button>
        </div>
      </div>`;
    }

    function exerciseChartHtml() {
      const d = exerciseView.data;
      const metric = exerciseView.metric;
      const metrics = exerciseMetrics(d);
      const tagChips = (d.muscles || []).length
        ? d.muscles.map((m) => `<span class="px-2 py-0.5 rounded-full bg-violet-600/10 text-violet-700 dark:text-violet-300 text-xs">${MUSCLE_LABELS[m] || esc(m)}</span>`).join('')
        : '<span class="text-xs italic text-zinc-400 dark:text-zinc-600">no muscle tags</span>';
      const editBtn = demo ? '' : '<button data-action="edit-muscles" class="text-xs text-violet-600 dark:text-violet-400 hover:text-violet-700 dark:hover:text-violet-300 px-1 shrink-0">Edit tags</button>';
      // Hide a history row (and its chart point) while its delete sits in
      // the undo window, mirroring the home / session lists.
      const visibleSessions = d.sessions.filter((s) => !isPendingDelete('hist', s.session_id));
      let body;
      if (!d.sessions.length) {
        body = '<div class="text-center text-zinc-500 dark:text-zinc-600 py-12">No sets logged yet — its history will appear here.</div>';
      } else {
        const points = visibleSessions
          .map((s) => ({ t: new Date(s.started_at).getTime(), v: sessionMetricValue(s.sets, metric) }))
          .filter((p) => p.v !== null);
        const wm = metric === 'maxw' || metric === 'vol' || metric === 'e1rm';
        const hist = [...visibleSessions].reverse().map((s) => `
          <div class="relative rounded-lg overflow-hidden">
            <div class="absolute inset-0 rounded-lg bg-red-500 dark:bg-red-600 flex items-center justify-end pr-4 text-white opacity-0" aria-hidden="true">🗑</div>
            <div data-swipe="hist:${s.session_id}" class="relative flex items-stretch rounded-lg bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 overflow-hidden">
              <button data-action="open-session" data-id="${s.session_id}" class="flex-1 text-left px-3 py-2 hover:bg-zinc-100 dark:hover:bg-zinc-800/60 min-w-0">
                <div class="text-sm font-medium">${fmtDateShort(s.started_at)}</div>
                <div class="text-xs font-mono text-zinc-500 truncate mt-0.5">${esc(fmtSetList(s.sets))}</div>
              </button>
              <button data-action="delete-history-entry" data-session="${s.session_id}" class="x-delete px-3 text-zinc-400 dark:text-zinc-600 hover:text-red-500 dark:hover:text-red-400" title="Delete this exercise from that workout">✕</button>
            </div>
          </div>`).join('');
        body = `
          ${metrics.length > 1 ? metricToggleHtml(metrics, metric) : ''}
          <div class="text-[10px] uppercase tracking-widest text-zinc-400 dark:text-zinc-600 mb-1">${METRIC_LABELS[metric]}${wm ? ' · ' + weightUnit : ''}</div>
          ${chartSvgHtml(points, (v) => fmtMetricVal(metric, v))}
          <div class="mt-4 mb-2 text-sm font-semibold text-zinc-600 dark:text-zinc-300">History</div>
          <div class="space-y-1.5 pb-6">${hist}</div>`;
      }
      // Whole-exercise delete: too destructive for the 5s undo window, so it
      // uses an inline two-step confirm instead (blocking confirm() dialogs
      // are suppressed in the platform iframe).
      const delBlock = exerciseView.confirmDelete
        ? `<div class="mt-2 mb-8 rounded-xl border border-red-300 dark:border-red-900 bg-red-50 dark:bg-red-950/40 p-3">
            <div class="text-sm text-red-700 dark:text-red-300">Delete “${esc(d.name)}” and its entire history${visibleSessions.length ? ` (${visibleSessions.length} workout${visibleSessions.length === 1 ? '' : 's'})` : ''}? This can’t be undone.</div>
            <div class="flex gap-2 mt-2.5">
              <button data-action="delete-exercise-confirm" ${exerciseView.deleting ? 'disabled' : ''} class="flex-1 py-2 rounded-lg bg-red-600 hover:bg-red-500 disabled:opacity-60 text-white text-sm font-medium">${exerciseView.deleting ? 'Deleting…' : 'Delete everything'}</button>
              <button data-action="delete-exercise-cancel" class="px-4 py-2 rounded-lg bg-zinc-200 dark:bg-zinc-700/60 text-sm">Cancel</button>
            </div>
          </div>`
        : `<div class="mt-2 mb-8 text-center">
            <button data-action="delete-exercise" class="text-xs text-zinc-500 hover:text-red-600 dark:text-zinc-600 dark:hover:text-red-400 px-2 py-1">🗑 Delete exercise…</button>
          </div>`;
      return `
        <header class="flex items-center gap-2 py-4">
          <button data-action="chart-back" class="px-2 py-1 rounded-lg text-zinc-500 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-100 text-lg">‹ Back</button>
          <div class="ml-1 flex-1 min-w-0">
            <div class="font-semibold truncate">${esc(d.name)}</div>
            <div class="text-xs text-zinc-500">${visibleSessions.length} workout${visibleSessions.length === 1 ? '' : 's'}</div>
          </div>
          ${unitSwitcherHtml()}
        </header>
        <div class="flex items-center gap-1.5 flex-wrap mb-3">${tagChips}${editBtn}</div>
        ${body}
        ${delBlock}
        ${muscleEditor ? muscleEditorHtml() : ''}`;
    }

    function muscleChartHtml() {
      const mv = muscleView;
      const label = MUSCLE_LABELS[mv.muscle] || esc(mv.muscle);
      let body;
      if (!mv.data.exercises.length) {
        body = `<div class="text-center text-zinc-500 dark:text-zinc-600 py-12 px-4">No exercises are tagged with ${label} yet.<br><span class="text-sm">Open an exercise from the Progress screen and use “Edit tags”.</span></div>`;
      } else if (!mv.data.sessions.length) {
        body = `<div class="text-center text-zinc-500 dark:text-zinc-600 py-12">No sets logged yet for ${label}-tagged exercises.</div>`;
      } else {
        const weeks = muscleWeeks(mv.data);
        const strength = muscleStrength(mv.data);
        const hasWeighted = mv.data.sessions.some((s) => s.sets.some((st) => st.set_type === 'reps' && parseFloat(st.weight) > 0));
        const metrics = hasWeighted ? ['e1rm', 'vol', 'sets'] : ['vol', 'sets'];
        const points = mv.metric === 'e1rm'
          ? strength.points.map((p) => ({ t: p.t, v: p.v }))
          : weeks.map((w) => ({ t: w.t, v: mv.metric === 'vol' ? w.vol : w.sets }));
        let headline = '';
        if (mv.metric === 'e1rm' && strength.current) {
          const lv = strengthLevel(mv.muscle, strength.current.v, bodyweightKg);
          headline = `<div class="mb-2 text-sm text-zinc-600 dark:text-zinc-300">
            <span class="font-semibold">Est. 1RM: ${fmtMetricVal('e1rm', strength.current.v)} ${weightUnit}</span>
            ${lv ? `<span class="ml-1 px-2 py-0.5 rounded-full bg-violet-600/10 text-violet-700 dark:text-violet-300 text-xs">${lv.label}</span>` : ''}
            <span class="text-xs text-zinc-500">· via</span>
            <button data-action="open-exercise-chart" data-id="${strength.current.exId}" class="text-xs text-violet-600 dark:text-violet-400 hover:text-violet-700 dark:hover:text-violet-300 underline decoration-dotted underline-offset-2">${esc(strength.current.exName)}</button>
          </div>`;
        }
        const counts = new Map();
        for (const s of mv.data.sessions) for (const st of s.sets) {
          counts.set(st.exercise_id, (counts.get(st.exercise_id) || 0) + 1);
        }
        const exRows = mv.data.exercises.map((x) => {
          const n = counts.get(x.id) || 0;
          const e1 = strength.perExercise.get(x.id);
          return `<button data-action="open-exercise-chart" data-id="${x.id}" class="w-full flex items-baseline justify-between gap-2 text-left px-3 py-2 rounded-lg bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 hover:bg-zinc-100 dark:hover:bg-zinc-800/60">
            <span class="text-sm font-medium truncate">${esc(x.name)}</span>
            <span class="text-xs text-zinc-500 shrink-0">${n} set${n === 1 ? '' : 's'}${e1 ? ' · ' + fmtMetricVal('e1rm', e1) + ' ' + weightUnit + ' e1RM' : ''}</span>
          </button>`;
        }).join('');
        body = `
          ${metricToggleHtml(metrics, mv.metric)}
          ${headline}
          <div class="text-[10px] uppercase tracking-widest text-zinc-400 dark:text-zinc-600 mb-1">${mv.metric === 'e1rm' ? 'Est. 1RM · ' + weightUnit : 'Weekly ' + (mv.metric === 'vol' ? 'volume · ' + weightUnit : 'sets')}</div>
          ${chartSvgHtml(points, (v) => fmtMetricVal(mv.metric, v))}
          <div class="mt-4 mb-2 text-sm font-semibold text-zinc-600 dark:text-zinc-300">Exercises</div>
          <div class="space-y-1.5 pb-6">${exRows}</div>`;
      }
      return `
        <header class="flex items-center gap-2 py-4">
          <button data-action="chart-back" class="px-2 py-1 rounded-lg text-zinc-500 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-100 text-lg">‹ Back</button>
          <div class="ml-1 flex-1 min-w-0">
            <div class="font-semibold">${label}</div>
            <div class="text-xs text-zinc-500">Weekly training across tagged exercises</div>
          </div>
          ${unitSwitcherHtml()}
        </header>
        ${body}`;
    }

    async function openProgress() {
      progressHub = { query: '', list: [], strength: null };
      exerciseView = null; muscleView = null; muscleEditor = null; bwEditor = null;
      openForm = null; picker = null; importSheet = null;
      view = 'progress';
      render();
      // Summary failures only cost the tint — never block the hub.
      const [listRes, sumRes] = await Promise.all([
        api('GET', '/api/exercises'),
        api('GET', '/api/muscles/summary').catch(() => null),
      ]);
      if (progressHub) {
        progressHub.list = listRes.exercises;
        if (sumRes) progressHub.strength = muscleStrengthSummary(sumRes.sets);
        renderProgressList();
        renderBodyDiagram();
      }
    }

    async function openExerciseChart(id, from) {
      const data = await api('GET', '/api/exercises/' + id + '/history');
      const metrics = exerciseMetrics(data);
      exerciseView = { data, metric: metrics[0] || 'maxw', from: from || 'progress' };
      muscleView = null; muscleEditor = null; bwEditor = null;
      view = 'exercise';
      render();
    }

    async function openMuscleChart(slug) {
      const data = await api('GET', '/api/muscles/' + slug + '/history');
      const weeks = muscleWeeks(data);
      // Est. 1RM is the default whenever weighted work exists; a muscle
      // trained only with timed/bodyweight work (all-zero volume) falls back
      // to Volume → Sets as before.
      const hasWeighted = data.sessions.some((s) => s.sets.some((st) => st.set_type === 'reps' && parseFloat(st.weight) > 0));
      muscleView = { muscle: slug, data, metric: hasWeighted ? 'e1rm' : (weeks.some((w) => w.vol > 0) ? 'vol' : 'sets') };
      exerciseView = null; muscleEditor = null; bwEditor = null;
      view = 'muscle';
      render();
    }

    function render() {
      const html = view === 'home' ? homeHtml()
        : view === 'session' ? sessionHtml()
        : view === 'progress' ? progressHtml()
        : view === 'exercise' ? exerciseChartHtml()
        : muscleChartHtml();
      document.getElementById('app').innerHTML = html;
      wireInputs();
      tick();
    }

    function wireInputs() {
      const form = document.getElementById('set-form');
      if (form) {
        form.addEventListener('submit', onSetSubmit);
        // Auto-focus only a blank form — focusing a pre-filled one pops the
        // mobile keyboard over values the user may just want to log as-is.
        const first = form.querySelector('input');
        if (first && !first.value) first.focus();
      }
      const ni = document.getElementById('entry-note-input');
      if (ni) {
        ni.focus();
        ni.setSelectionRange(ni.value.length, ni.value.length);
        ni.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); ni.blur(); }
          else if (e.key === 'Escape') { ni.dataset.cancel = '1'; ni.blur(); }
        });
        ni.addEventListener('blur', async () => {
          const cancelled = ni.dataset.cancel === '1';
          const entryId = +ni.dataset.entry;
          const val = ni.value;
          editingNote = null;
          if (cancelled) { render(); return; }
          try { await api('PATCH', '/api/session-exercises/' + entryId, { note: val }); }
          catch (err) { toast(err.message); }
          await refreshSession();
        });
      }
      const sni = document.getElementById('session-note-input');
      if (sni) {
        sni.focus();
        sni.setSelectionRange(sni.value.length, sni.value.length);
        sni.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); sni.blur(); }
          else if (e.key === 'Escape') { sni.dataset.cancel = '1'; sni.blur(); }
        });
        sni.addEventListener('blur', async () => {
          const cancelled = sni.dataset.cancel === '1';
          const val = sni.value;
          editingSessionNote = false;
          if (cancelled) { render(); return; }
          try { await api('PATCH', '/api/sessions/' + session.id, { note: val }); }
          catch (err) { toast(err.message); }
          await refreshSession();
        });
      }
      if (importSheet) {
        const ta = document.getElementById('import-text');
        ta.value = importSheet.text;
        ta.addEventListener('input', () => { importSheet.text = ta.value; });
        const fi = document.getElementById('import-file');
        fi.addEventListener('change', () => {
          const f = fi.files && fi.files[0];
          if (!f) return;
          const r = new FileReader();
          r.onload = () => {
            if (!importSheet) return;
            importSheet.text = String(r.result || '');
            const cur = document.getElementById('import-text');
            if (cur) cur.value = importSheet.text;
          };
          r.readAsText(f);
        });
      }
      if (picker) {
        const si = document.getElementById('picker-search');
        si.value = picker.query;
        si.addEventListener('input', () => { picker.query = si.value; renderPickerList(); });
        si.focus();
        renderPickerList();
      }
      if (view === 'progress' && progressHub) {
        const ps = document.getElementById('progress-search');
        if (ps) {
          // no autofocus — popping the keyboard would hide the body diagram
          ps.value = progressHub.query;
          ps.addEventListener('input', () => { progressHub.query = ps.value; renderProgressList(); });
          renderProgressList();
        }
      }
      if (bwEditor) {
        const bi = document.getElementById('bw-input');
        if (bi) {
          if (bodyweightKg) bi.value = String(kgToUnitNum(bodyweightKg));
          bi.focus();
        }
      }
    }

    // ---------- import / export ----------

    // Handed to an AI (or a human) along with data from another app so it can
    // be transformed into our import format. Keep in sync with the server's
    // parseImportPayload / buildSetValues validation rules.
    const IMPORT_FORMAT_SPEC = [
      'GYM TRACKER — IMPORT FORMAT SPECIFICATION ("gym-tracker-export", version 1)',
      '',
      'Task: convert workout history from any other format into the JSON described',
      'below. The result is pasted into the app\'s "Import JSON" sheet (or uploaded',
      'as a .json file), so output ONLY the JSON document — valid, UTF-8, no',
      'comments, no trailing commas, no markdown fences.',
      '',
      'TOP LEVEL — either of these two forms:',
      '  { "format": "gym-tracker-export", "version": 1, "sessions": [ <Session>, ... ] }',
      '  [ <Session>, ... ]            (a bare array of sessions is also accepted)',
      '"format", "version", and "exported_at" are optional and ignored on import;',
      'only "sessions" matters. Unknown/extra keys anywhere are ignored.',
      'Limits: at most 1000 sessions and 20000 total sets per file.',
      '',
      'SESSION object — one workout:',
      '  "started_at"  REQUIRED string. Any date string JavaScript\'s new Date()',
      '                parses; strongly prefer ISO 8601 with an explicit timezone,',
      '                e.g. "2024-05-03T18:30:00Z" or "2024-05-03T18:30:00+02:00".',
      '                This is the session\'s identity: a session whose started_at',
      '                resolves to the exact same instant (millisecond-exact) as one',
      '                already stored is SKIPPED, which makes re-imports safe. So:',
      '                keep timestamps stable across conversions, never give two',
      '                sessions in one file the same instant, and if the source only',
      '                has a date (no time), pick a consistent convention like',
      '                "T12:00:00Z".',
      '  "note"        optional string or null. Freeform; trimmed, max 500 chars kept.',
      '  "exercises"   optional array of Exercise (default []). Order is preserved.',
      '',
      'EXERCISE object — one exercise performed in the session:',
      '  "name"  REQUIRED non-empty string, max 120 chars (leading/trailing whitespace',
      '          trimmed, internal runs of whitespace collapsed to single spaces).',
      '          Matched case-insensitively against the user\'s existing exercises and',
      '          created on demand — "Bench Press" and "bench press" are the same',
      '          exercise. Use one consistent spelling per movement so history links up.',
      '  "note"  optional string or null, max 500 chars. Put qualifiers like assisted',
      '          reps or band assistance here — there are no dedicated fields for them.',
      '  "sets"  optional array of Set (default []). Order is preserved and meaningful',
      '          (see "drop" below).',
      '',
      'SET object — exactly one of two shapes, chosen by "type" (alias "set_type"):',
      '  Shape 1 — "type": "reps"  (rep-based work):',
      '    "reps"    REQUIRED integer, 1 to 9999.',
      '    "weight"  REQUIRED number, 0 to 99999 (kept to 2 decimal places).',
      '              Weights are stored in KILOGRAMS: if the source data is in',
      '              pounds, convert to kg (divide by 2.20462, round to 2 decimals);',
      '              if it is already kg, carry the number through unchanged. The',
      '              app converts to the user\'s display unit (kg or lbs) at render',
      '              time. Use 0 for bodyweight sets.',
      '  Shape 2 — "type": "time"  (timed holds / cardio):',
      '    "duration_seconds"  REQUIRED integer, 1 to 86400 (whole seconds; convert',
      '                        mm:ss or minutes to seconds).',
      '    "effort"            optional string or null, max 120 chars — freeform,',
      '                        e.g. "hard", "level 12", "5 km".',
      '  Omit the other shape\'s fields (they are ignored and stored as null).',
      '  Fields valid on BOTH shapes:',
      '    "side"        optional "left" | "right" | null (any other value is an',
      '                  error). null/omitted means both sides / untagged. For',
      '                  "each side" work, emit two sets: one "left", one "right".',
      '    "drop"        optional boolean (alias "is_drop"), default false. true marks',
      '                  this set as a drop-set continuation of the set immediately',
      '                  before it; a run of consecutive drop:true sets after a normal',
      '                  set displays as one drop chain, so array order matters. The',
      '                  first set of an exercise should not be drop:true.',
      '    "note"        optional string or null, max 500 chars.',
      '    "created_at"  optional date string; defaults to the session\'s started_at.',
      '                  Only set it if the source has real per-set timestamps.',
      '',
      'VALIDATION & BEHAVIOR:',
      '- The whole file is validated before anything is written: one invalid value',
      '  rejects the entire import (all-or-nothing, no partial writes). Errors name',
      '  the offending path, e.g. "sessions[2].exercises[0].sets[1]: reps must be a',
      '  whole number between 1 and 9999".',
      '- Import is additive — it never edits or deletes existing data. Already-present',
      '  sessions (exact started_at match) are skipped, so importing twice is safe.',
      '',
      'WORKED EXAMPLE (valid, importable as-is):',
      '{',
      '  "format": "gym-tracker-export",',
      '  "version": 1,',
      '  "sessions": [',
      '    {',
      '      "started_at": "2024-05-03T18:30:00Z",',
      '      "note": "Push day",',
      '      "exercises": [',
      '        {',
      '          "name": "Bench Press",',
      '          "sets": [',
      '            { "type": "reps", "reps": 10, "weight": 60 },',
      '            { "type": "reps", "reps": 8, "weight": 70, "note": "spotter on last rep" },',
      '            { "type": "reps", "reps": 8, "weight": 50, "drop": true }',
      '          ]',
      '        },',
      '        {',
      '          "name": "Single-arm Row",',
      '          "note": "3s pause at the top",',
      '          "sets": [',
      '            { "type": "reps", "reps": 12, "weight": 24, "side": "left" },',
      '            { "type": "reps", "reps": 12, "weight": 24, "side": "right" }',
      '          ]',
      '        },',
      '        {',
      '          "name": "Plank",',
      '          "sets": [ { "type": "time", "duration_seconds": 90, "effort": "hard" } ]',
      '        }',
      '      ]',
      '    }',
      '  ]',
      '}',
    ].join('\n');

    async function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        try { await navigator.clipboard.writeText(text); return; } catch (_) { /* fall through */ }
      }
      // Fallback for iframes / older WebViews without clipboard permission.
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      let ok = false;
      try { ok = document.execCommand('copy'); } catch (_) {}
      ta.remove();
      if (!ok) throw new Error('Couldn’t copy — clipboard unavailable in this browser');
    }

    async function exportJson() {
      // Can't use api(): the response is a file, not JSON to consume.
      const res = await fetch('/api/export' + (demo ? '?demo=1' : ''), { headers: authHeaders });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.error || 'Export failed (' + res.status + ')');
      }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'gym-tracker-export-' + new Date().toISOString().slice(0, 10) + '.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    // ---------- set form ----------
    function findEntryLocal(id) {
      return session.entries.find((e) => e.id === id);
    }
    // draft.weight is in the display unit; draft.weightKg keeps the exact
    // stored kg so an untouched field saves back the same value instead of
    // drifting through a lbs round-trip.
    function draftFromSet(st) {
      return {
        type: st.set_type,
        reps: st.reps ?? '',
        weight: st.weight != null ? fmtW(st.weight) : '',
        weightKg: st.weight != null ? parseFloat(st.weight) : null,
        duration: st.duration_seconds != null ? fmtDur(st.duration_seconds) : '',
        effort: st.effort || '',
        side: st.side || '',
        drop: !!st.is_drop,
        note: st.note || '',
      };
    }
    function prefillDraft(entryId) {
      const en = findEntryLocal(entryId);
      const src = (en.sets.length && en.sets[en.sets.length - 1]) ||
        (en.last_time && en.last_time.sets.length && en.last_time.sets[en.last_time.sets.length - 1]);
      // Side carries over (log left, flip one toggle to log right); note and
      // the drop flag always start fresh.
      if (src) { const d = draftFromSet(src); d.note = ''; d.drop = false; return d; }
      return { type: 'reps', reps: '', weight: '', weightKg: null, duration: '', effort: '', side: '', drop: false, note: '' };
    }
    function readDraft(form) {
      const g = (n) => { const i = form.querySelector('[name="' + n + '"]'); return i ? i.value : ''; };
      const dropEl = form.querySelector('[name="drop"]');
      return { type: openForm.draft.type, side: openForm.draft.side || '', reps: g('reps'), weight: g('weight'), weightKg: openForm.draft.weightKg ?? null, duration: g('duration'), effort: g('effort'), drop: dropEl ? dropEl.checked : !!openForm.draft.drop, note: g('note') };
    }
    // The kg value to save: if the field still shows the untouched original,
    // keep the exact stored kg; otherwise convert what was typed.
    function draftWeightKg(d) {
      const n = Number(d.weight);
      return d.weightKg != null && n === kgToUnitNum(d.weightKg) ? d.weightKg : unitToKg(n);
    }

    async function onSetSubmit(e) {
      e.preventDefault();
      const d = readDraft(e.target);
      openForm.draft = d;
      await flushPendingDelete();
      const body = { set_type: d.type, side: d.side || null, is_drop: !!d.drop, note: d.note };
      if (d.type === 'reps') {
        if (d.reps.trim() === '') { openForm.error = 'Enter reps'; return render(); }
        if (d.weight.trim() === '') { openForm.error = 'Enter weight (0 for bodyweight)'; return render(); }
        body.reps = Number(d.reps);
        body.weight = draftWeightKg(d);
      } else {
        const dur = parseDur(d.duration);
        if (!Number.isInteger(dur) || dur < 1) { openForm.error = 'Enter duration as seconds or mm:ss'; return render(); }
        body.duration_seconds = dur;
        body.effort = d.effort;
      }
      try {
        if (openForm.setId) {
          await api('PATCH', '/api/sets/' + openForm.setId, body);
          openForm = null;
        } else {
          await api('POST', '/api/session-exercises/' + openForm.entryId + '/sets', body);
          stopwatchStart = Date.now(); // logging a set (re)starts the rest stopwatch
          openForm = { entryId: openForm.entryId, setId: null, draft: { ...d, weightKg: body.weight ?? null, note: '', drop: false }, error: '' };
        }
        await refreshSession();
      } catch (err) {
        openForm.error = err.message;
        render();
      }
    }

    // ---------- data loading ----------
    async function loadHome() {
      sessions = (await api('GET', '/api/sessions')).sessions;
      view = 'home';
      session = null;
      render();
    }
    async function refreshSession() {
      try {
        session = await api('GET', '/api/sessions/' + session.id);
        render();
      } catch (err) {
        toast(err.message);
        await loadHome();
      }
    }
    // Reload the exercise chart screen in place (after a history-row delete),
    // keeping the selected metric when it still applies.
    async function refreshExerciseView() {
      if (!exerciseView) return;
      try {
        const data = await api('GET', '/api/exercises/' + exerciseView.data.id + '/history');
        exerciseView.data = data;
        const metrics = exerciseMetrics(data);
        if (!metrics.includes(exerciseView.metric)) exerciseView.metric = metrics[0] || 'maxw';
        render();
      } catch (err) {
        toast(err.message);
        await loadHome();
      }
    }
    async function openSession(id) {
      session = await api('GET', '/api/sessions/' + id);
      view = 'session';
      openForm = null;
      editingNote = null;
      editingSessionNote = false;
      importSheet = null;
      picker = null;
      seedStopwatch();
      render();
    }

    // ---------- stopwatch (client-side only) ----------
    function seedStopwatch() {
      let newest = 0;
      for (const en of session.entries) {
        for (const st of en.sets) {
          const t = new Date(st.created_at).getTime();
          if (t > newest) newest = t;
        }
      }
      stopwatchStart = newest && Date.now() - newest < 30 * 60 * 1000 ? newest : null;
    }
    function tick() {
      const el = document.getElementById('stopwatch');
      if (!el) return;
      if (!stopwatchStart) { el.textContent = '—:—'; return; }
      const s = Math.floor((Date.now() - stopwatchStart) / 1000);
      if (s >= 3600) { stopwatchStart = null; el.textContent = '—:—'; return; }
      el.textContent = fmtDur(s);
    }
    setInterval(tick, 1000);

    // ---------- deferred delete (swipe on touch, X buttons on desktop) ----------
    // Deferred delete: the row is hidden immediately, but the DELETE request
    // is only sent when the 5s undo window closes — Undo is a pure
    // client-side restore, nothing to recreate server-side.
    const DELETE_LABELS = { session: 'Workout deleted', entry: 'Exercise removed', set: 'Set deleted', hist: 'Removed from that workout' };

    function isPendingDelete(kind, id) {
      return !!pendingDelete && pendingDelete.kind === kind && pendingDelete.id === id;
    }
    // 'hist' rows (exercise history) key on the session id but delete the
    // underlying entry rows — usually one, more if the exercise was added to
    // that workout twice.
    function deleteUrlsFor(pd) {
      if (pd.kind === 'session') return ['/api/sessions/' + pd.id];
      if (pd.kind === 'entry') return ['/api/session-exercises/' + pd.id];
      if (pd.kind === 'hist') return (pd.entryIds || []).map((id) => '/api/session-exercises/' + id);
      return ['/api/sets/' + pd.id];
    }
    function showUndoToast(msg) {
      document.getElementById('undo-toast-msg').textContent = msg;
      document.getElementById('undo-toast').classList.remove('hidden');
    }
    function hideUndoToast() {
      document.getElementById('undo-toast').classList.add('hidden');
    }
    function startPendingDelete(kind, id) {
      // Resolve the entry ids up front — the commit may fire after the view
      // (and exerciseView with it) has moved on.
      let entryIds = null;
      if (kind === 'hist') {
        const s = exerciseView && exerciseView.data.sessions.find((x) => x.session_id === id);
        entryIds = s ? s.entry_ids : [];
        if (!entryIds.length) return;
      }
      flushPendingDelete().catch((err) => toast(err.message)); // a new swipe commits the previous pending delete right away
      pendingDelete = { kind, id, entryIds, timer: setTimeout(() => { commitPendingDelete().catch((err) => toast(err.message)); }, 5000) };
      render();
      showUndoToast(DELETE_LABELS[kind]);
    }
    function undoPendingDelete() {
      if (pendingDelete) { clearTimeout(pendingDelete.timer); pendingDelete = null; }
      hideUndoToast();
      render();
    }
    // Send the deferred DELETE. {noRefresh} callers are about to load fresh
    // data themselves; on failure the current view always reloads so the
    // hidden row reappears.
    async function commitPendingDelete(opts) {
      if (!pendingDelete) return;
      const pd = pendingDelete;
      pendingDelete = null;
      clearTimeout(pd.timer);
      hideUndoToast();
      if (openForm && ((pd.kind === 'entry' && openForm.entryId === pd.id) || (pd.kind === 'set' && openForm.setId === pd.id))) openForm = null;
      let failed = false;
      try {
        for (const url of deleteUrlsFor(pd)) await api('DELETE', url);
      } catch (err) {
        failed = true;
        toast(err.message);
      }
      if (failed || !opts || !opts.noRefresh) {
        // carry in-progress set-form typing across the re-render
        const form = document.getElementById('set-form');
        if (form && openForm) openForm.draft = readDraft(form);
        if (view === 'exercise' && exerciseView) await refreshExerciseView();
        else if (view === 'home' || !session) await loadHome();
        else await refreshSession();
      }
    }
    function flushPendingDelete() {
      return commitPendingDelete({ noRefresh: true });
    }
    // Hiding/closing the page mid-window must not orphan the deletion.
    function flushPendingDeleteKeepalive() {
      if (!pendingDelete) return;
      const pd = pendingDelete;
      pendingDelete = null;
      clearTimeout(pd.timer);
      hideUndoToast();
      needsRefreshOnShow = true;
      try {
        for (const url of deleteUrlsFor(pd)) fetch(url, { method: 'DELETE', headers: authHeaders, keepalive: true });
      } catch (_) {}
    }
    window.addEventListener('pagehide', flushPendingDeleteKeepalive);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') flushPendingDeleteKeepalive();
      else if (needsRefreshOnShow) {
        needsRefreshOnShow = false;
        (view === 'exercise' && exerciseView ? refreshExerciseView()
          : view === 'home' || !session ? loadHome()
          : refreshSession()).catch((err) => toast(err.message));
      }
    });

    // Delegated touch handlers survive the app's full re-renders, mirroring
    // the click delegation below. Only touch input fires these — desktop
    // mouse users are unaffected.
    let swipeGesture = null;
    document.addEventListener('touchstart', (e) => {
      if (e.touches.length !== 1) return;
      const t = e.target;
      if (!t.closest || t.closest('#set-form') || t.closest('input, textarea')) return;
      const el = t.closest('[data-swipe]'); // innermost swipeable wins (set row inside entry card)
      if (!el) return;
      swipeGesture = {
        el,
        key: el.dataset.swipe,
        startX: e.touches[0].clientX,
        startY: e.touches[0].clientY,
        lastX: e.touches[0].clientX,
        lastT: e.timeStamp,
        vx: 0,
        dx: 0,
        width: el.offsetWidth,
        armed: false,
        dead: false,
      };
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      const g = swipeGesture;
      if (!g || g.dead) return;
      const touch = e.touches[0];
      const dx = touch.clientX - g.startX;
      const dy = touch.clientY - g.startY;
      if (!g.armed) {
        if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return; // within slop
        if (Math.abs(dy) >= Math.abs(dx)) { g.dead = true; return; } // vertical scroll wins for the rest of this touch
        g.armed = true;
        g.el.style.transition = 'none';
        g.el.style.willChange = 'transform';
        // the red backdrop stays hidden at rest so it can't peek through
        // the row's rounded corners; reveal it only while swiping
        if (g.el.previousElementSibling) g.el.previousElementSibling.style.opacity = '1';
      }
      const dt = e.timeStamp - g.lastT;
      if (dt > 0) g.vx = (touch.clientX - g.lastX) / dt;
      g.lastX = touch.clientX;
      g.lastT = e.timeStamp;
      g.dx = Math.min(0, dx); // left-swipe only
      g.el.style.transform = 'translateX(' + g.dx + 'px)';
      if (e.cancelable) e.preventDefault();
    }, { passive: false });

    document.addEventListener('touchend', () => {
      const g = swipeGesture;
      swipeGesture = null;
      if (!g || !g.armed || g.dead) return;
      suppressClicksUntil = Date.now() + 350; // swallow the synthesized post-swipe click
      g.el.style.transition = 'transform 150ms ease-out';
      if (-g.dx >= g.width * 0.4 || g.vx < -0.5) {
        g.el.style.transform = 'translateX(-' + g.width + 'px)';
        const parts = g.key.split(':');
        setTimeout(() => startPendingDelete(parts[0], +parts[1]), 150);
      } else {
        g.el.style.transform = 'translateX(0)';
        setTimeout(() => { if (g.el.previousElementSibling) g.el.previousElementSibling.style.opacity = ''; }, 160);
      }
    });

    document.addEventListener('touchcancel', () => {
      const g = swipeGesture;
      swipeGesture = null;
      if (g && g.armed) {
        g.el.style.transition = 'transform 150ms ease-out';
        g.el.style.transform = 'translateX(0)';
        setTimeout(() => { if (g.el.previousElementSibling) g.el.previousElementSibling.style.opacity = ''; }, 160);
      }
    });

    // ---------- actions ----------
    async function addExercise(exerciseId) {
      await api('POST', '/api/sessions/' + session.id + '/exercises', { exercise_id: exerciseId });
      picker = null;
      await refreshSession();
    }

    document.addEventListener('click', (e) => {
      const el = e.target.closest('[data-action]');
      if (!el) return;
      // ignore the click a swipe just synthesized — one-shot, never the Undo button
      if (Date.now() < suppressClicksUntil && !el.closest('#undo-toast')) { suppressClicksUntil = 0; return; }
      const action = el.dataset.action;
      // backdrop closes only on a direct click, not clicks inside the sheet
      if ((action === 'close-picker' || action === 'close-import' || action === 'close-muscle-editor' || action === 'close-bw-editor') && e.target !== el) return;
      handle(action, el).catch((err) => toast(err.message));
    });

    // Actions that navigate, mutate data, or open an edit surface commit any
    // pending swipe delete first, so lists stay consistent and a later
    // deferred refresh can't wipe in-progress typing.
    const FLUSH_BEFORE = new Set(['start-workout', 'open-session', 'back-home', 'delete-session', 'delete-entry', 'delete-set', 'pick-exercise', 'create-exercise', 'open-add-set', 'edit-set', 'add-note', 'session-note', 'export-json', 'import-json', 'run-import', 'open-progress', 'open-exercise-chart', 'open-muscle-chart', 'chart-back', 'delete-history-entry', 'delete-exercise', 'delete-exercise-confirm']);

    async function handle(action, el) {
      if (FLUSH_BEFORE.has(action)) await flushPendingDelete();
      switch (action) {
        case 'start-workout': {
          const s = await api('POST', '/api/sessions');
          await openSession(s.id);
          break;
        }
        case 'open-session':
          await openSession(+el.dataset.id);
          break;
        case 'delete-session':
          // No confirm() here — the platform iframe suppresses blocking
          // dialogs (confirm silently returns false), which made the X
          // buttons dead. The undo window is the confirmation instead.
          startPendingDelete('session', +el.dataset.id);
          break;
        case 'back-home':
          openForm = null; editingNote = null; editingSessionNote = false; picker = null;
          progressHub = null; exerciseView = null; muscleView = null; muscleEditor = null; bwEditor = null;
          await loadHome();
          break;
        case 'open-progress':
          await openProgress();
          break;
        case 'open-exercise-chart': {
          // Remember where we came from so Back returns there.
          const from = view === 'session' && session ? 'session:' + session.id
            : view === 'muscle' && muscleView ? 'muscle:' + muscleView.muscle
            : 'progress';
          await openExerciseChart(+el.dataset.id, from);
          break;
        }
        case 'open-muscle-chart':
          await openMuscleChart(el.dataset.muscle);
          break;
        case 'chart-metric':
          if (view === 'exercise' && exerciseView) exerciseView.metric = el.dataset.metric;
          else if (view === 'muscle' && muscleView) muscleView.metric = el.dataset.metric;
          render();
          break;
        case 'chart-back': {
          if (view === 'muscle') { muscleView = null; await openProgress(); break; }
          const from = (exerciseView && exerciseView.from) || 'progress';
          exerciseView = null; muscleEditor = null;
          if (from.indexOf('session:') === 0) await openSession(+from.slice(8));
          else if (from.indexOf('muscle:') === 0) await openMuscleChart(from.slice(7));
          else await openProgress();
          break;
        }
        case 'edit-muscles':
          muscleEditor = { selected: [...(exerciseView.data.muscles || [])] };
          render();
          break;
        case 'toggle-muscle': {
          const m = el.dataset.muscle;
          const i = muscleEditor.selected.indexOf(m);
          if (i >= 0) muscleEditor.selected.splice(i, 1); else muscleEditor.selected.push(m);
          render();
          break;
        }
        case 'close-muscle-editor':
          muscleEditor = null;
          render();
          break;
        case 'save-muscles': {
          const r = await api('PATCH', '/api/exercises/' + exerciseView.data.id, { muscles: muscleEditor.selected });
          exerciseView.data.muscles = r.muscles;
          muscleEditor = null;
          render();
          break;
        }
        case 'open-bw-editor':
          bwEditor = true;
          render();
          break;
        case 'close-bw-editor':
          bwEditor = null;
          render();
          break;
        case 'save-bw': {
          const bi = document.getElementById('bw-input');
          const raw = ((bi && bi.value) || '').trim();
          let kg = null;
          if (raw !== '') {
            const n = Number(raw);
            if (!Number.isFinite(n) || n <= 0) { toast('Enter a valid bodyweight'); break; }
            kg = unitToKg(n); // input is in the display unit, stored in kg
          }
          const r = await api('PATCH', '/api/settings', { bodyweight_kg: kg });
          bodyweightKg = r.bodyweight_kg !== null ? parseFloat(r.bodyweight_kg) || null : null;
          bwEditor = null;
          render();
          break;
        }
        case 'open-picker': {
          picker = { query: '', list: [] };
          render();
          const list = (await api('GET', '/api/exercises')).exercises;
          if (picker) { picker.list = list; renderPickerList(); }
          break;
        }
        case 'close-picker':
          picker = null;
          render();
          break;
        case 'pick-exercise':
          await addExercise(+el.dataset.id);
          break;
        case 'create-exercise': {
          const name = picker.query.trim();
          const ex = await api('POST', '/api/exercises', { name });
          await addExercise(ex.id);
          break;
        }
        case 'delete-entry':
          startPendingDelete('entry', +el.dataset.entry);
          break;
        case 'delete-history-entry':
          // Same undo-window confirmation as the other deletes (blocking
          // confirm() dialogs are suppressed in the platform iframe).
          startPendingDelete('hist', +el.dataset.session);
          break;
        case 'delete-exercise':
          exerciseView.confirmDelete = true;
          render();
          break;
        case 'delete-exercise-cancel':
          exerciseView.confirmDelete = false;
          render();
          break;
        case 'delete-exercise-confirm': {
          if (exerciseView.deleting) break;
          exerciseView.deleting = true;
          render();
          try {
            await api('DELETE', '/api/exercises/' + exerciseView.data.id);
          } catch (err) {
            exerciseView.deleting = false;
            render();
            throw err;
          }
          toast('Exercise deleted', true);
          await openProgress();
          break;
        }
        case 'add-note':
          editingNote = +el.dataset.entry;
          render();
          break;
        case 'open-add-set':
          openForm = { entryId: +el.dataset.entry, setId: null, draft: prefillDraft(+el.dataset.entry), error: '' };
          render();
          break;
        case 'edit-set': {
          const en = findEntryLocal(+el.dataset.entry);
          const st = en.sets.find((x) => x.id === +el.dataset.set);
          openForm = { entryId: en.id, setId: st.id, draft: draftFromSet(st), error: '' };
          render();
          break;
        }
        case 'cancel-set-form':
          openForm = null;
          render();
          break;
        case 'delete-set':
          await api('DELETE', '/api/sets/' + el.dataset.set);
          openForm = null;
          await refreshSession();
          break;
        case 'form-type': {
          const form = document.getElementById('set-form');
          if (form) openForm.draft = readDraft(form);
          openForm.draft.type = el.dataset.type;
          openForm.error = '';
          render();
          break;
        }
        case 'form-side': {
          const form = document.getElementById('set-form');
          if (form) openForm.draft = readDraft(form);
          openForm.draft.side = el.dataset.side;
          render();
          break;
        }
        case 'session-note':
          editingSessionNote = true;
          render();
          break;
        case 'import-json':
          importSheet = { text: '', error: '', busy: false, specCopied: false };
          render();
          break;
        case 'copy-format-spec': {
          await copyText(IMPORT_FORMAT_SPEC);
          if (importSheet) {
            importSheet.specCopied = true;
            render();
            setTimeout(() => {
              if (importSheet && importSheet.specCopied) { importSheet.specCopied = false; render(); }
            }, 2000);
          }
          break;
        }
        case 'close-import':
          importSheet = null;
          render();
          break;
        case 'run-import': {
          const ta = document.getElementById('import-text');
          const text = (ta ? ta.value : importSheet.text).trim();
          if (ta) importSheet.text = ta.value;
          if (!text) { importSheet.error = 'Paste JSON or choose a file first.'; render(); break; }
          let payload;
          try { payload = JSON.parse(text); }
          catch (_) { importSheet.error = 'That isn’t valid JSON — check the file or paste.'; render(); break; }
          importSheet.busy = true; importSheet.error = ''; render();
          try {
            const r = await api('POST', '/api/import', payload);
            importSheet = null;
            await loadHome();
            const parts = ['Imported ' + r.imported + ' workout' + (r.imported === 1 ? '' : 's')];
            if (r.skipped) parts.push(r.skipped + ' skipped as already present');
            toast(parts.join(' — '), true);
          } catch (err) {
            importSheet.busy = false;
            importSheet.error = err.message;
            render();
          }
          break;
        }
        case 'reset-stopwatch':
          stopwatchStart = Date.now();
          tick();
          break;
        case 'set-theme':
          setThemePref(el.dataset.theme);
          applyTheme();
          render();
          break;
        case 'set-unit': {
          const u = el.dataset.unit;
          if (u === weightUnit) break;
          // An open set form holds a weight in the old unit — re-express it
          // in the new one (via the exact kg when the field is untouched).
          const form = document.getElementById('set-form');
          if (form && openForm) {
            const d = readDraft(form);
            const n = Number(d.weight);
            if (d.type === 'reps' && d.weight.trim() !== '' && Number.isFinite(n)) {
              d.weightKg = draftWeightKg(d);
              d.weight = String(kgToUnitNum(d.weightKg, u));
            }
            openForm.draft = d;
          }
          weightUnit = u;
          render();
          api('PATCH', '/api/settings', { weight_unit: u }).catch((err) => toast(err.message));
          break;
        }
        case 'undo-delete':
          undoPendingDelete();
          break;
        case 'export-json':
          await exportJson();
          break;
      }
    }

    // ?import=1 deep-links straight to the import sheet (also lets the
    // proposal checks exercise it, since tests can only navigate routes).
    if (params.get('import') === '1') importSheet = { text: '', error: '', busy: false, specCopied: false };

    // The unit preference must be known before the first weights render.
    (async () => {
      try {
        const st = await api('GET', '/api/settings');
        weightUnit = st.weight_unit === 'lbs' ? 'lbs' : 'kg';
        bodyweightKg = st.bodyweight_kg !== null && st.bodyweight_kg !== undefined ? parseFloat(st.bodyweight_kg) || null : null;
      }
      catch (_) {} // default to kg / no bodyweight — never block the app on the setting
      // ?session=<id> deep-links straight into that session's view, and
      // &picker=1 also opens the add-exercise sheet — like ?import=1, this
      // lets the proposal checks reach screens that otherwise need clicks.
      const deepSession = parseInt(params.get('session') || '', 10);
      if (deepSession) {
        try {
          await openSession(deepSession);
          if (params.get('picker') === '1') await handle('open-picker', null);
          return;
        } catch (_) {} // unknown/foreign session — fall through to home
      }
      // ?progress=1 / ?exercise=<id> / ?muscle=<slug> deep-link into the
      // Progress area — used by the proposal checks like ?session above.
      if (params.get('progress') === '1') {
        try { await openProgress(); return; } catch (_) {}
      }
      const deepExercise = parseInt(params.get('exercise') || '', 10);
      if (deepExercise) {
        try { await openExerciseChart(deepExercise, 'progress'); return; } catch (_) {}
      }
      const deepMuscle = params.get('muscle');
      if (deepMuscle) {
        try { await openMuscleChart(deepMuscle); return; } catch (_) {}
      }
      await loadHome();
    })().catch((err) => toast(err.message));
  </script>
</body>
</html>

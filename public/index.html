<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Inline data-URI favicon: prevents the browser's automatic /favicon.ico
       request (which would hit the auth-gated catch-all and 401). -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='64'%20height='64'%20viewBox='0%200%2064%2064'%3E%3Crect%20width='64'%20height='64'%20rx='14'%20fill='%237c3aed'/%3E%3Ctext%20x='32'%20y='34'%20font-size='34'%20text-anchor='middle'%20dominant-baseline='central'%3E%F0%9F%8F%8B%EF%B8%8F%3C/text%3E%3C/svg%3E">

  <script>
  // usernode-dev-console@1
  (function () {
    if (window.__usernodeDevConsole) return;
    window.__usernodeDevConsole = true;
    var S = '__usernodeDevConsole';
    function serialize(v, depth) {
      depth = depth || 0;
      try {
        if (v === undefined) return 'undefined';
        if (v === null) return 'null';
        if (typeof v === 'string') return v;
        if (typeof v === 'number' || typeof v === 'boolean') return String(v);
        if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
        if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
        if (depth > 3) return '[…]';
        var seen = new WeakSet();
        return JSON.stringify(v, function (k, val) {
          if (typeof val === 'object' && val !== null) {
            if (seen.has(val)) return '[Circular]';
            seen.add(val);
          }
          if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
          if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
          return val;
        });
      } catch (e) { try { return String(v); } catch (_) { return '[unserializable]'; } }
    }
    function post(level, args, meta) {
      try {
        var payload = {
          sentinel: S,
          level: level,
          args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }),
          ts: Date.now(),
          url: location.href,
        };
        if (meta) for (var k in meta) payload[k] = meta[k];
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(payload, '*');
        }
      } catch (_) {}
    }
    ['log','info','warn','error','debug'].forEach(function (level) {
      var orig = console[level] ? console[level].bind(console) : function () {};
      console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
    });
    window.addEventListener('error', function (e) {
      var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
      post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason;
      var msg = (r && (r.stack || r.message)) || String(r);
      post('error', [msg], { kind: 'unhandledrejection' });
    });
    try { post('info', ['[dev-console ready]'], { kind: 'ready' }); } catch (_) {}
  })();
  </script>
  <title>Gym Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>

  <!-- Keep vertical scrolling native on swipeable rows; horizontal moves
       are captured by the swipe-to-delete handlers. -->
  <style>
    [data-swipe] { touch-action: pan-y; }
    /* Touch devices delete via swipe-left; hide the X buttons there.
       Gated on the primary pointer (not viewport width) so a narrow
       desktop window — where swipe doesn't exist — keeps its Xs. */
    @media (hover: none) and (pointer: coarse) {
      .x-delete { display: none; }
    }
  </style>

  <!-- Theme bootstrap: apply the stored preference (light/dark/system,
       default system) before first paint to avoid a wrong-theme flash. -->
  <script>
  (function () {
    var pref = 'system';
    try {
      var stored = localStorage.getItem('gym-tracker-theme');
      if (stored === 'light' || stored === 'dark' || stored === 'system') pref = stored;
    } catch (_) {}
    var dark = pref === 'dark' ||
      (pref === 'system' && window.matchMedia &&
       window.matchMedia('(prefers-color-scheme: dark)').matches);
    document.documentElement.classList.toggle('dark', dark);
  })();
  </script>
</head>
<body class="bg-white text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100 min-h-screen">
  <div id="app" class="w-full max-w-md mx-auto px-4 pb-28"></div>
  <div id="toast" class="hidden fixed top-3 left-1/2 -translate-x-1/2 bg-red-500/90 text-white text-sm px-4 py-2 rounded-lg z-50 max-w-[90%] text-center shadow-lg"></div>
  <div id="undo-toast" class="hidden fixed bottom-16 left-1/2 -translate-x-1/2 z-40 flex items-center gap-1 bg-zinc-800 text-zinc-100 dark:bg-zinc-100 dark:text-zinc-900 text-sm pl-4 pr-1.5 py-1.5 rounded-full shadow-lg max-w-[90%]">
    <span id="undo-toast-msg"></span>
    <button data-action="undo-delete" class="font-semibold text-violet-300 dark:text-violet-700 px-2.5 py-1 rounded-full">Undo</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    const demo = params.get('demo') === '1';
    const authHeaders = token ? { 'x-usernode-token': token } : {};

    // ---------- state ----------
    let view = 'home';        // 'home' | 'session'
    let sessions = [];        // home list
    let session = null;       // session detail payload
    let picker = null;        // { query, list } when the add-exercise sheet is open
    let openForm = null;      // { entryId, setId|null, draft, error } for the set form
    let editingNote = null;   // entry id whose note input is open
    let editingSessionNote = false; // the workout-level note input is open
    let importSheet = null;   // { text, error, busy } while the import sheet is open
    let progressHub = null;   // { query, list, strength } — Progress hub exercise list + per-muscle scores
    let exerciseView = null;  // { data, metric, from, confirmDelete, deleting } — per-exercise chart screen
    let muscleView = null;    // { muscle, data, metric } — per-muscle chart screen
    let muscleEditor = null;  // { selected } while the muscle tag-edit sheet is open
    let bwEditor = null;      // truthy while the bodyweight sheet is open
    let weightUnit = 'kg';    // display unit ('kg' | 'lbs'); weights are always stored in kg
    let bodyweightKg = null;  // bodyweight in kg (null = unset; strength levels hidden)
    let stopwatchStart = null; // epoch ms of last logged set / manual reset, or null (idle)
    let toastTimer = null;
    let pendingDelete = null;    // { kind: 'session'|'entry'|'set'|'hist', id, entryIds, timer } — deferred swipe delete in its undo window ('hist' = history row keyed by session id, deleting its entryIds)
    let suppressClicksUntil = 0; // swallows the click browsers synthesize right after a swipe's touchend
    let needsRefreshOnShow = false; // a keepalive flush happened while hidden; reload on return

    // ---------- theme ----------
    const THEME_KEY = 'gym-tracker-theme';
    const themeMq = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;
    function getThemePref() {
      try {
        const v = localStorage.getItem(THEME_KEY);
        if (v === 'light' || v === 'dark' || v === 'system') return v;
      } catch (_) {}
      return 'system';
    }
    function setThemePref(v) {
      try {
        if (v === 'system') localStorage.removeItem(THEME_KEY);
        else localStorage.setItem(THEME_KEY, v);
      } catch (_) {}
    }
    function applyTheme() {
      const pref = getThemePref();
      const dark = pref === 'dark' || (pref === 'system' && themeMq && themeMq.matches);
      document.documentElement.classList.toggle('dark', dark);
    }
    // Follow the OS live, but only while the user hasn't set an explicit choice.
    if (themeMq) {
      const onSystemChange = () => { if (getThemePref() === 'system') applyTheme(); };
      if (themeMq.addEventListener) themeMq.addEventListener('change', onSystemChange);
      else if (themeMq.addListener) themeMq.addListener(onSystemChange);
    }

    // ---------- helpers ----------
    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function fmtDate(ts) {
      const d = new Date(ts);
      return d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' }) +
        ' · ' + d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    }
    function fmtDateShort(ts) {
      return new Date(ts).toLocaleDateString([], { month: 'short', day: 'numeric' });
    }
    // Weights are stored in kg; convert only for display / input. lbs are
    // shown to 1 decimal, and lbs input is rounded to 2 decimals of kg
    // (matching the column's NUMERIC(7,2)) before saving.
    const LBS_PER_KG = 2.20462;
    function kgToUnitNum(kg, unit) {
      const n = parseFloat(kg);
      if (!Number.isFinite(n)) return NaN;
      return (unit || weightUnit) === 'lbs' ? Math.round(n * LBS_PER_KG * 10) / 10 : n;
    }
    function unitToKg(n) {
      return weightUnit === 'lbs' ? Math.round((n / LBS_PER_KG) * 100) / 100 : n;
    }
    function fmtW(w) {
      const n = kgToUnitNum(w);
      return Number.isFinite(n) ? String(n) : String(w);
    }
    function fmtDur(s) {
      return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
    }
    function parseDur(v) {
      const t = String(v || '').trim();
      if (/^\d+$/.test(t)) return parseInt(t, 10);
      const m = t.match(/^(\d+):([0-5]?\d)$/);
      if (m) return parseInt(m[1], 10) * 60 + parseInt(m[2], 10);
      return NaN;
    }
    function fmtSet(s) {
      const side = s.side === 'left' ? 'L ' : s.side === 'right' ? 'R ' : '';
      if (s.set_type === 'reps') return side + s.reps + ' × ' + fmtW(s.weight) + ' ' + weightUnit;
      return side + fmtDur(s.duration_seconds) + (s.effort ? ' · ' + s.effort : '');
    }
    // One-line summary of a set list where drop sets chain onto their parent:
    // "10 × 60 ↘ 8 × 50, 8 × 55"
    function fmtSetList(sets) {
      return sets.map((s, i) => (i ? (s.is_drop ? ' ↘ ' : ', ') : '') + fmtSet(s)).join('');
    }
    function toast(msg, ok) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.toggle('bg-red-500/90', !ok);
      t.classList.toggle('bg-emerald-600/90', !!ok);
      t.classList.remove('hidden');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.add('hidden'), 3500);
    }

    async function api(method, url, body) {
      if (method === 'GET' && demo) url += (url.includes('?') ? '&' : '?') + 'demo=1';
      const res = await fetch(url, {
        method,
        headers: { ...(body ? { 'Content-Type': 'application/json' } : {}), ...authHeaders },
        body: body ? JSON.stringify(body) : undefined,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'Request failed (' + res.status + ')');
      return data;
    }

    // ---------- rendering ----------
    const inp = 'bg-white dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-700 rounded-lg px-2.5 py-1.5 text-sm outline-none focus:border-violet-500';

    // ---------- progress / muscle constants ----------
    const MUSCLE_LABELS = { chest: 'Chest', back: 'Back', shoulders: 'Shoulders', biceps: 'Biceps', triceps: 'Triceps', quads: 'Quads', hamstrings: 'Hamstrings', glutes: 'Glutes', calves: 'Calves', core: 'Core', forearms: 'Forearms' };
    const MUSCLE_SLUGS = Object.keys(MUSCLE_LABELS);
    const METRIC_LABELS = { maxw: 'Max weight', vol: 'Volume', e1rm: 'Est. 1RM', maxdur: 'Longest set', totaldur: 'Total time', sets: 'Sets' };

    // Strength-level thresholds: multiples of bodyweight applied to the
    // muscle's current Est. 1RM — [novice, intermediate, advanced]; any score
    // below novice = beginner, no live score = unrated. Heuristics anchored
    // to each muscle's classic lift (bench, squat, deadlift, OHP, …).
    const STRENGTH_THRESHOLDS = {
      chest: [0.60, 1.00, 1.50], back: [0.90, 1.40, 2.00], shoulders: [0.40, 0.65, 0.95],
      biceps: [0.30, 0.50, 0.75], triceps: [0.50, 0.85, 1.25], quads: [0.75, 1.25, 1.75],
      hamstrings: [0.90, 1.40, 2.00], glutes: [1.00, 1.50, 2.25], calves: [1.00, 1.50, 2.25],
      core: [0.30, 0.50, 0.75], forearms: [0.30, 0.50, 0.75],
    };
    const LEVEL_LABELS = ['Beginner', 'Novice', 'Intermediate', 'Advanced'];
    // Sequential single-hue ramp, one entry per level (light / dark). Dark
    // mode inverts lightness so "deeper = stronger" reads on both themes.
    const LEVEL_FILLS = [
      'fill-violet-200 dark:fill-violet-900',
      'fill-violet-400 dark:fill-violet-700',
      'fill-violet-600 dark:fill-violet-500',
      'fill-violet-800 dark:fill-violet-300',
    ];
    const LEVEL_DOTS = [
      'bg-violet-200 dark:bg-violet-900',
      'bg-violet-400 dark:bg-violet-700',
      'bg-violet-600 dark:bg-violet-500',
      'bg-violet-800 dark:bg-violet-300',
    ];

    function strengthLevel(muscle, scoreKg, bwKg) {
      const th = STRENGTH_THRESHOLDS[muscle];
      if (!th || !(scoreKg > 0) || !(bwKg > 0)) return null;
      const r = scoreKg / bwKg;
      const level = r >= th[2] ? 3 : r >= th[1] ? 2 : r >= th[0] ? 1 : 0;
      return { level, label: LEVEL_LABELS[level] };
    }

    function themeSwitcherHtml() {
      const pref = getThemePref();
      const opt = (t, label, icon) => `<button type="button" data-action="set-theme" data-theme="${t}" title="${label}" aria-label="${label}" aria-pressed="${pref === t}" class="px-2 py-1 text-sm leading-none transition-colors ${pref === t ? 'bg-violet-600 text-white' : 'text-zinc-500 hover:text-zinc-800 dark:text-zinc-400 dark:hover:text-zinc-100'}">${icon}</button>`;
      return `<div class="flex rounded-lg overflow-hidden border border-zinc-200 dark:border-zinc-700">
        ${opt('light', 'Light', '☀')}${opt('dark', 'Dark', '☾')}${opt('system', 'System', '◐')}
      </div>`;
    }

    function unitSwitcherHtml() {
      const opt = (u) => `<button type="button" data-action="set-unit" data-unit="${u}" title="Show weights in ${u}" aria-pressed="${weightUnit === u}" class="px-2 py-1 text-xs leading-none transition-colors ${weightUnit === u ? 'bg-violet-600 text-white' : 'text-zinc-500 hover:text-zinc-800 dark:text-zinc-400 dark:hover:text-zinc-100'}">${u}</button>`;
      return `<div class="flex rounded-lg overflow-hidden border border-zinc-200 dark:border-zinc-700">${opt('kg')}${opt('lbs')}</div>`;
    }

    function homeHtml() {
      const visible = sessions.filter((s) => !isPendingDelete('session', s.id));
      const rows = visible.length ? visible.map((s) => `
        <div class="relative rounded-xl overflow-hidden">
          <div class="absolute inset-0 rounded-xl bg-red-500 dark:bg-red-600 flex items-center justify-end pr-5 text-white text-xl opacity-0" aria-hidden="true">🗑</div>
          <div data-swipe="session:${s.id}" class="relative flex items-stretch rounded-xl bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 overflow-hidden">
            <button data-action="open-session" data-id="${s.id}" class="flex-1 text-left px-4 py-3 hover:bg-zinc-100 dark:hover:bg-zinc-800/60 min-w-0">
              <div class="font-medium">${fmtDate(s.started_at)}</div>
              <div class="text-sm text-zinc-500 mt-0.5">${s.exercise_count} exercise${s.exercise_count === 1 ? '' : 's'} · ${s.set_count} set${s.set_count === 1 ? '' : 's'}</div>
              ${s.exercise_names ? `<div class="text-xs text-zinc-500 dark:text-zinc-600 truncate mt-0.5">${esc(s.exercise_names)}</div>` : ''}
              ${s.note ? `<div class="text-xs italic text-amber-700 dark:text-amber-200/80 truncate mt-0.5">${esc(s.note)}</div>` : ''}
            </button>
            <button data-action="delete-session" data-id="${s.id}" class="x-delete px-3 text-zinc-400 dark:text-zinc-600 hover:text-red-500 dark:hover:text-red-400" title="Delete workout">✕</button>
          </div>
        </div>`).join('')
        : '<div class="text-center text-zinc-500 dark:text-zinc-600 py-12">No workouts yet — start your first one!</div>';
      return `
        <header class="flex items-center justify-between gap-2 py-5">
          <h1 class="text-2xl font-bold">🏋️ Gym Tracker</h1>
          <div class="flex items-center gap-2">${unitSwitcherHtml()}${themeSwitcherHtml()}</div>
        </header>
        <button data-action="start-workout" class="w-full py-3.5 rounded-xl bg-violet-600 hover:bg-violet-500 active:scale-[.99] transition-all font-semibold text-white shadow-lg shadow-violet-600/20 mb-2">+ Start workout</button>
        <button data-action="open-progress" class="w-full py-3 rounded-xl bg-zinc-50 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 hover:bg-zinc-100 dark:hover:bg-zinc-800/60 font-medium mb-5">📈 Progress</button>
        <div class="space-y-2">${rows}</div>
        <div class="flex justify-center gap-6 mt-6">
          <button data-action="export-json" class="text-xs text-zinc-500 hover:text-zinc-700 dark:text-zinc-600 dark:hover:text-zinc-400 px-2 py-1">Export JSON</button>
          <button data-action="import-json" class="text-xs text-zinc-500 hover:text-zinc-700 dark:text-zinc-600 dark:hover:text-zinc-400 px-2 py-1">Import JSON</button>
        </div>
        ${importSheet ? importSheetHtml() : ''}`;
    }

    function setFormHtml() {
      const d = openForm.draft;
      const seg = (t, label) => `<button type="button" data-action="form-type" data-type="${t}" class="flex-1 py-1.5 rounded-lg text-sm transition-colors ${d.type === t ? 'bg-violet-600 text-white' : 'bg-zinc-200 text-zinc-600 dark:bg-zinc-800 dark:text-zinc-400'}">${label}</button>`;
      const fields = d.type === 'reps'
        ? `<div class="flex gap-2 mt-2">
             <input name="reps" type="number" min="1" step="1" inputmode="numeric" value="${esc(d.reps)}" placeholder="reps" class="${inp} w-1/2 min-w-0">
             <div class="relative w-1/2 min-w-0">
               <input name="weight" type="number" min="0" step="any" inputmode="decimal" value="${esc(d.weight)}" placeholder="weight (${weightUnit})" class="${inp} w-full pr-9">
               <span class="absolute right-2.5 top-1/2 -translate-y-1/2 text-xs text-zinc-400 dark:text-zinc-500 pointer-events-none">${weightUnit}</span>
             </div>
           </div>`
        : `<div class="flex gap-2 mt-2">
             <input name="duration" value="${esc(d.duration)}" placeholder="mm:ss or sec" autocomplete="off" class="${inp} w-1/2 min-w-0">
             <input name="effort" value="${esc(d.effort)}" placeholder="effort (level 8…)" maxlength="120" autocomplete="off" class="${inp} w-1/2 min-w-0">
           </div>`;
      // Side applies to both shapes; the drop toggle only makes sense once the
      // entry has a set to drop from (or when unflagging an existing drop set).
      const en = findEntryLocal(openForm.entryId);
      const others = en ? en.sets.filter((s) => !isPendingDelete('set', s.id)) : [];
      const pos = openForm.setId ? others.findIndex((s) => s.id === openForm.setId) : others.length;
      const showDrop = pos > 0 || d.drop;
      const sideBtn = (v, label) => `<button type="button" data-action="form-side" data-side="${v}" class="flex-1 py-1 rounded-lg text-xs transition-colors ${(d.side || '') === v ? 'bg-violet-600 text-white' : 'bg-zinc-200 text-zinc-600 dark:bg-zinc-800 dark:text-zinc-400'}">${label}</button>`;
      return `<form id="set-form" class="mt-2 rounded-xl bg-zinc-100 dark:bg-zinc-800/70 border border-zinc-200 dark:border-zinc-700 p-2.5">
        <div class="flex gap-1.5">${seg('reps', 'Reps × Weight')}${seg('time', 'Time × Effort')}</div>
        ${fields}
        <div class="flex items-center gap-2 mt-2">
          <div class="flex gap-1 flex-1">${sideBtn('', 'Both')}${sideBtn('left', 'L')}${sideBtn('right', 'R')}</div>
          ${showDrop ? `<label class="flex items-center gap-1.5 text-xs text-zinc-600 dark:text-zinc-400 whitespace-nowrap"><input type="checkbox" name="drop" ${d.drop ? 'checked' : ''} class="accent-violet-600"> ↘ Drop set</label>` : ''}
        </div>
        <input name="note" value="${esc(d.note)}" placeholder="note (optional)" maxlength="500" autocomplete="off" class="${inp} w-full mt-2">
        ${openForm.error ? `<div class="text-red-600 dark:text-red-400 text-xs mt-1.5">${esc(openForm.error)}</div>` : ''}
        <div class="flex items-center gap-2 mt-2">
          <button type="submit" class="flex-1 py-2 rounded-lg bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium">${openForm.setId ? 'Save' : 'Log set'}</button>
          <button type="button" data-action="cancel-set-form" class="px-3 py-2 rounded-lg bg-zinc-200 dark:bg-zinc-700/60 text-sm">Cancel</button>
          ${openForm.setId ? `<button type="button" data-action="delete-set" data-set="${openForm.setId}" class="px-3 py-2 rounded-lg text-red-600 dark:text-red-400 text-sm" title="Delete set">Delete</button>` : ''}
        </div>
      </form>`;
    }

    function entryHtml(en) {
      const noteHtml = editingNote === en.id
        ? `<input id="entry-note-input" data-entry="${en.id}" value="${esc(en.note || '')}" placeholder="Add a note…" maxlength="500" autocomplete="off" class="${inp} w-full mt-1.5">`
        : en.note
          ? `<button data-action="add-note" data-entry="${en.id}" class="block w-full text-left mt-1 text-sm italic text-amber-700 dark:text-amber-200/80">${esc(en.note)}</button>`
          : `<button data-action="add-note" data-entry="${en.id}" class="mt-0.5 text-xs text-zinc-500 hover:text-zinc-700 dark:text-zinc-600 dark:hover:text-zinc-400">＋ note</button>`;
      const lt = en.last_time
        ? `<div class="mt-1.5 text-xs text-zinc-600 dark:text-zinc-400 bg-zinc-100 dark:bg-zinc-800/50 rounded-lg px-2.5 py-1.5">Last time · ${fmtDateShort(en.last_time.started_at)} — <span class="font-mono">${esc(fmtSetList(en.last_time.sets))}</span></div>`
        : '';
      // Drop sets chain onto the previous set: they don't advance the set
      // number and show a ↘ marker in the number slot instead.
      let setNum = 0;
      const setRows = en.sets.filter((s) => !isPendingDelete('set', s.id)).map((s) => {
        if (!s.is_drop) setNum++;
        if (openForm && openForm.setId === s.id) return setFormHtml();
        return `<div class="relative rounded-lg overflow-hidden">
          <div class="absolute inset-0 rounded-lg bg-red-500 dark:bg-red-600 flex items-center justify-end pr-3 text-white text-sm opacity-0" aria-hidden="true">🗑</div>
